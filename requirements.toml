[meta]
project = "Kiln WebAssembly Runtime"
version = "0.2.0"
safety_standard = "ISO26262"

[[requirement]]
id = "REQ_MEM_001"
title = "Memory Bounds Checking"
description = "All memory operations must be bounds-checked to prevent buffer overflows"
type = "Memory"
asil_level = "AsilC"
implementations = ["kiln-foundation/src/safe_memory.rs"]
tests = ["kiln-foundation/tests/memory_tests_moved.rs"]
documentation = ["docs/architecture/memory_model.rst"]

[[requirement]]
id = "REQ_SAFETY_001"
title = "ASIL Context Maintenance"
description = "Runtime must maintain safety context with ASIL level tracking"
type = "Safety"
asil_level = "AsilD"
implementations = ["kiln-foundation/src/safety_system.rs"]
tests = ["kiln-foundation/tests/"]
documentation = ["docs/architecture/safety.rst"]

[[requirement]]
id = "REQ_COMP_001"
title = "Component Isolation"
description = "Components must be isolated from each other with proper resource boundaries"
type = "Component"
asil_level = "AsilC"
implementations = ["kiln-component/src/bounded_resource_management.rs"]
tests = ["kiln-component/tests/resource_management_tests.rs"]
documentation = ["docs/architecture/component_model.rst"]

[[requirement]]
id = "REQ_ASYNC_001"
title = "Async Task Management"
description = "Async operations must be properly managed with task cancellation and resource cleanup"
type = "Runtime"
asil_level = "AsilB"
implementations = ["kiln-component/src/threading/task_manager.rs", "kiln-component/src/async_/async_canonical.rs"]
tests = ["kiln-component/tests/async_features_integration_test.rs"]
documentation = ["docs/architecture/async_threading.rst"]

[[requirement]]
id = "REQ_PARSE_001"
title = "Bounded WIT Parsing"
description = "WIT parsing must respect memory limits and prevent unbounded allocation"
type = "Parse"
asil_level = "AsilC"
implementations = ["kiln-format/src/bounded_wit_parser.rs"]
tests = ["kiln-format/tests/parser_test_reference.rs"]
documentation = ["docs/architecture/intercept_system.rst"]

[[requirement]]
id = "REQ_ERROR_001"
title = "Structured Error Handling"
description = "All errors must be categorized and traceable with proper context"
type = "System"
asil_level = "AsilB"
implementations = ["kiln-error/src/errors.rs", "kiln-error/src/codes.rs"]
tests = ["kiln-error/tests/error_conversion_test.rs"]
documentation = ["docs/architecture/logging.rst"]

[[requirement]]
id = "REQ_ADVANCED_THREADING_001"
title = "Advanced Threading Support"
description = "Advanced threading capabilities including task management, spawning, and synchronization"
type = "Runtime"
asil_level = "AsilB"
implementations = ["kiln-component/src/threading/advanced_threading_builtins.rs", "kiln-component/src/threading/thread_builtins.rs"]
tests = ["kiln-component/tests/"]
documentation = ["docs/source/requirements.rst"]