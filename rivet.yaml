project:
  name: kiln
  version: "0.3.1"
  description: >
    WebAssembly runtime for safety-critical systems. Implements the
    WebAssembly Core Spec 3.0, Component Model, and WASI Preview 2
    with ASIL-D through QM safety level support.
  schemas:
    - common
    - stpa
    - dev
    # ASPICE 4.0 V-model verification types (SWE.5/SWE.6 unit/integration test) —
    # adopted 2026-06 to model the right side of the V (tests verifying
    # requirements). Closes the gap where dev modelled requirement→decision→feature
    # only and nothing could reach `verified` status. See pulseengine.eu#88.
    - aspice

sources:
  - path: safety/stpa
    format: stpa-yaml
  - path: safety/stpa-sec
    format: stpa-yaml
  - path: safety/requirements
    format: generic-yaml

docs:
  - docs

commits:
  format: trailers
  trailers:
    Trace: traces-to
    Implements: implements
    Fixes: fixes
    Verifies: verifies
  exempt-types:
    - chore
    - style
    - ci
    - docs
    - build
  traced-paths:
    - kiln-runtime/
    - kiln-decoder/
    - kiln-foundation/
    - kiln-component/
    - kiln-platform/
    - kiln-error/
    - kiln-instructions/
    - kiln-sync/
    - kiln-async/
    - kiln-host/
    - kiln-intercept/
    - kiln-wasi/
    - kilnd/
    - safety/

externals:
  meld:
    git: https://github.com/pulseengine/meld.git
    path: /Volumes/Home/git/pulseengine/meld
    ref: main
    prefix: meld

  synth:
    git: https://github.com/pulseengine/synth.git
    path: /Volumes/Home/git/pulseengine/synth
    ref: main
    prefix: synth

  gale:
    git: https://github.com/pulseengine/gale.git
    path: /Volumes/Home/git/pulseengine/gale
    ref: main
    prefix: gale

  gust:
    # gust artifacts live in the gale repo (gale-gust is a gale checkout); distinct
    # prefix for the OS/gust artifact set.
    git: https://github.com/pulseengine/gale.git
    path: /Volumes/Home/git/pulseengine/gale-gust
    ref: main
    prefix: gust

  loom:
    git: https://github.com/pulseengine/loom.git
    path: /Volumes/Home/git/pulseengine/loom
    ref: main
    prefix: loom

  sigil:
    git: https://github.com/pulseengine/sigil.git
    path: /Volumes/Home/git/pulseengine/sigil
    ref: main
    prefix: sigil
