artifacts:
  # =========================================================================
  # Core Architecture Decisions
  # =========================================================================
  - id: AD-COMP-001
    type: design-decision
    title: Component-based modular architecture
    description: >
      The system is decomposed into independently testable and certifiable
      components (crates), each with a single well-defined responsibility.
      Higher layers depend only on lower layers. Platform-specific code is
      isolated in the Platform Abstraction Layer.
    status: implemented
    tags: [architecture, modularity]
    links:
      - type: satisfies
        target: REQ_PLATFORM_001
      - type: satisfies
        target: REQ_FUNC_002
    fields:
      rationale: >
        Modular design enables independent testing, certification, and
        platform-specific optimization. Clear separation of concerns allows
        selective feature inclusion and minimizes dependencies.
      previous-id: ARCH_DEC_COMP_001
      implementation: Cargo workspace with 24 specialized crates

  - id: AD-DEPLOY-001
    type: design-decision
    title: Multi-platform deployment strategy
    description: >
      Different deployment environments (server, embedded Linux, QNX, VxWorks,
      Zephyr RTOS, bare-metal) are supported through the platform abstraction
      layer with environment-specific memory models, security features, and
      resource constraints.
    status: partial
    tags: [architecture, platform, deployment]
    links:
      - type: satisfies
        target: REQ_PLATFORM_001
      - type: satisfies
        target: REQ_FUNC_002
      - type: satisfies
        target: REQ_FUNC_033
    fields:
      rationale: >
        Different deployment environments require different memory models
        and security features. Platform abstraction isolates these
        differences behind common interfaces.
      previous-id: ARCH_DEC_DEPLOY_001
      implementation: kiln-platform/src/

  - id: AD-CRATE-001
    type: design-decision
    title: Fine-grained crate organization
    description: >
      Implementation organized into fine-grained crates (kiln-error,
      kiln-foundation, kiln-format, kiln-decoder, kiln-runtime,
      kiln-instructions, kiln-component, kiln-platform, etc.) to enable
      selective feature inclusion and minimize dependency footprint.
    status: implemented
    tags: [architecture, organization]
    links:
      - type: satisfies
        target: REQ_LFUNC_006
    fields:
      rationale: >
        Fine-grained crates enable selective feature compilation (e.g.,
        exclude Component Model for embedded), clear dependency boundaries
        for safety analysis, and independent testing/verification.
      previous-id: ARCH_DEC_CRATE_001
      implementation: Cargo.toml workspace members

  - id: AD-ENV-001
    type: design-decision
    title: Multi-environment architecture (std / no_std+alloc / no_std)
    description: >
      Four environment configurations supported via conditional compilation:
      full std, no_std with alloc, no_std without alloc (bounded collections),
      and bare-metal. Same interfaces work across all environments with
      different backing implementations.
    status: implemented
    tags: [architecture, no-std, platform]
    links:
      - type: satisfies
        target: REQ_FUNC_002
      - type: satisfies
        target: REQ_LFUNC_006
    fields:
      rationale: >
        Different deployment scenarios require different resource trade-offs.
        Conditional compilation with trait-based abstractions provides full
        feature parity across environments.
      previous-id: ARCH_DEC_ENV_001
      implementation: "#![cfg_attr(not(feature = \"std\"), no_std)] across all crates"

  - id: AD-PATTERNS-001
    type: design-decision
    title: Three-tier environment support pattern
    description: >
      Trait-based abstractions (MemoryProvider, ComponentFactory, etc.) with
      environment-specific implementations selected at compile time. BoundedVec,
      BoundedString, and other bounded collections replace std collections in
      no_alloc environments.
    status: implemented
    tags: [architecture, patterns, no-std]
    links:
      - type: satisfies
        target: REQ_FUNC_002
      - type: satisfies
        target: REQ_LFUNC_006
      - type: satisfies
        target: REQ_MEM_SAFETY_005
    fields:
      rationale: >
        Trait-based abstractions with conditional compilation enable the same
        API surface across std, no_std+alloc, and no_std+no_alloc environments
        without runtime overhead. The MemoryProvider abstraction backs the
        capability-based safe_managed_alloc! allocator, whose RAII guards give
        deterministic, explicit memory lifetime (no use-after-free / double-free)
        across all three tiers.
      previous-id: ARCH_DEC_PATTERNS_001
      implementation: kiln-foundation/src/safe_memory.rs, kiln-foundation/src/bounded.rs

  - id: AD-EXEC-001
    type: design-decision
    title: Stackless, resumable interpreter execution model
    description: >
      The interpreter executes WebAssembly with an explicit operand/control
      stack held in a data structure rather than recursing on the host call
      stack. Execution is driven by a step loop over a program counter, so it
      can be suspended and resumed at instruction boundaries. This is what makes
      fuel-based bounded execution possible: the engine decrements fuel per step
      and yields when exhausted, without unwinding native frames.
    status: implemented
    tags: [architecture, runtime, execution-model, bounded-execution]
    links:
      - type: satisfies
        target: REQ_FUNC_001
      - type: satisfies
        target: REQ_LFUNC_005
    fields:
      rationale: >
        A stackless design bounds host stack usage (no recursion on guest call
        depth), enables deterministic suspend/resume for fuel metering and
        cooperative scheduling, and keeps worst-case host stack depth
        independent of the guest program — all prerequisites for the
        embedded / no_std execution path.
      alternatives-considered: >
        (1) Recursive tree-walking on the host stack — rejected: guest call
        depth would drive host stack usage (unbounded, overflow risk) and could
        not be suspended for fuel/scheduling. (2) Native-thread-per-task with
        stack switching — rejected for no_std / no-alloc targets.
      implementation: kiln-runtime/src/stackless/engine.rs

  # =========================================================================
  # Tooling & Verification Decisions
  # =========================================================================
  - id: AD-BUILD-001
    type: design-decision
    title: Unified build and verification tooling (cargo-kiln)
    description: >
      Single CLI entry point (cargo-kiln) for all build, test, verification,
      and ASIL compliance operations. Includes: ASIL-level verification
      (verify --asil d), build matrix verification (verify-matrix --report),
      no-std validation, requirements traceability (requirements verify),
      safety feature testing, and diagnostic system with LSP-compatible
      JSON output.
    status: implemented
    tags: [tooling, build-system, verification]
    links:
      - type: satisfies
        target: REQ_CONFIG_001
      - type: satisfies
        target: REQ_CONFIG_003
    fields:
      rationale: >
        Single entry point ensures consistent configuration validation and
        safe defaults across all development activities. Build matrix
        verification detects ASIL compliance issues before merge.
        Replaces fragmented shell scripts and justfile recipes.
      previous-id: IMPL_CONFIG_001
      implementation: cargo-kiln/src/, kiln-build-core/src/

  - id: AD-VERIFY-001
    type: design-decision
    title: Configurable verification level system
    description: >
      Multiple verification levels (Off, Basic, Standard, Full, Sampling,
      Redundant) configurable per-component and per-deployment scenario.
      Verification operates independently of the functionality it protects —
      safety mechanisms can be verified without affecting execution behavior.
    status: implemented
    tags: [verification, safety-independence, asil-d]
    links:
      - type: satisfies
        target: REQ_SAFETY_004
    fields:
      rationale: >
        Safety mechanism independence (ISO 26262-6:7.4.10) requires that
        verification systems do not share failure modes with the mechanisms
        they verify. Configurable levels allow deployment-appropriate
        trade-offs between coverage and performance.
      previous-id: SPEC_VERIFY_001, IMPL_VERIFICATION_001
      implementation: kiln-foundation/src/verification.rs

  - id: AD-QUALITY-001
    type: design-decision
    title: Defense-in-depth verification strategy (formal + dynamic)
    description: >
      Correctness is established by combining independent verification
      techniques rather than relying on any single one: formal proof of
      bounded-collection invariants (Verus, CI-gating), bounded model checking
      of critical paths (Kani), fuzzing of parsers and bounded structures,
      WAST conformance against the official WebAssembly test suite, and Miri
      for UB detection. Each technique has different blind spots; combining
      them shrinks the residual faster than deepening any one.
    status: implemented
    tags: [verification, defense-in-depth, formal-methods, fuzzing, testing]
    links:
      - type: satisfies
        target: REQ_VERIFY_010
      - type: satisfies
        target: REQ_QA_010
    fields:
      rationale: >
        Per the PulseEngine defense-in-depth methodology, in safety-relevant
        domains a portfolio of techniques (proofs + model checkers + fuzzing +
        conformance + sanitizers) covers more failure modes than tightening a
        single technique. Verus is the only CI-gating formal method today;
        Kani is weekly/manual (#237); fuzzing and WAST run in CI.
      alternatives-considered: >
        (1) Single formal method end-to-end — rejected: no tractable proof of
        the whole interpreter exists, and a single technique leaves correlated
        blind spots. (2) Tests-only — rejected: gives no invariant guarantees
        for the embedded cert scope.
      implementation: "Verus: kiln-foundation/src/verus_proofs/; Kani harnesses; fuzz/; kiln-build-core/src/wast_execution.rs"

  - id: AD-DEBUG-001
    type: design-decision
    title: Source-level, WIT-aware debugging via DWARF mapping
    description: >
      Debugging maps running core-WebAssembly execution back to original source
      through DWARF debug information, and is WIT-aware so component-model
      execution can be inspected at the interface-type level rather than only as
      raw core values. Breakpoints and stack traces operate over the stackless
      engine's explicit frames. This is a QM reference-interpreter capability
      (developer-facing), not part of the certified embedded scope.
    status: implemented
    tags: [tooling, debugging, dwarf, wit]
    links:
      - type: satisfies
        target: REQ_FUNC_032
    fields:
      rationale: >
        Source-level and WIT-aware debugging is what makes the interpreter
        usable as a behavioral reference and oracle for the fused embedded core:
        a developer can observe component-level semantics, not just core opcodes.
        DWARF reuse avoids a bespoke debug-info format.
      alternatives-considered: >
        (1) printf/trace-only debugging — rejected: cannot inspect interface
        types or set breakpoints. (2) Core-wasm-only debugging without WIT
        mapping — rejected: component execution would be opaque at the ABI
        boundary, defeating the reference-oracle purpose.
      implementation: kiln-runtime/src/debug/

  # =========================================================================
  # WASI Architecture
  # =========================================================================
  - id: AD-WASI-001
    type: design-decision
    title: Trait-based WASI dispatch via HostImportHandler
    description: >
      All host function dispatch goes through the HostImportHandler trait
      defined in kiln-foundation. The engine (kiln-runtime) has no direct
      dependency on kiln-wasi types — it holds a Box<dyn HostImportHandler>.
      WasiDispatcher implements this trait and provides the WASI Preview 2
      host functions. This design enables: (1) meld and synth to provide
      their own HostImportHandler implementations for custom host functions,
      (2) composing multiple host handlers (WASI + domain-specific),
      (3) testing with mock host handlers. The prior architecture had a
      direct wasi_dispatcher field on the engine which created a dual
      dispatch path, resource handle mismatches, and prevented cross-repo
      reuse.
    status: implemented
    tags: [wasi, architecture, host-interface, cross-repo]
    links:
      - type: satisfies
        target: REQ_FUNC_034
      - type: satisfies
        target: REQ_FUNC_015
      - type: satisfies
        target: REQ_FUNC_035
      - type: satisfies
        target: REQ_FUNC_036
    fields:
      rationale: >
        Trait-based dispatch decouples the engine from any specific host
        implementation. This is essential for the PulseEngine ecosystem
        where meld (component lowering) and synth (stub generation) need
        to inject their own host functions alongside or instead of WASI.
        The dual-dispatcher bug (LS-W-1) proved that direct type references
        between engine and host crates create architectural fragility.
        The HostImportHandler trait boundary provides a clean, testable,
        extensible interface.
      alternatives-considered: >
        (1) Direct kiln_wasi dependency — rejected, couples engine to WASI
        and prevents cross-repo reuse. (2) Generic type parameter on engine —
        rejected, makes engine non-object-safe and complicates multi-handler
        composition. (3) Function pointer table — rejected, less safe and
        harder to extend with new methods.
      implementation: kiln-foundation/src/traits.rs, kiln-runtime/src/stackless/engine.rs

  - id: AD-PUBLISH-001
    type: design-decision
    title: Publish to crates.io under the kilnvm-* namespace, synth-modeled workflow
    description: >
      The workspace publishes to crates.io under the kilnvm-* prefix (kilnvm-runtime,
      kilnvm-foundation, …; daemon kilnvmd; cargo-kiln CLI unchanged). The bare kiln-*
      namespace is contested by unrelated owners (kiln-runtime by zenvanexus, plus
      kiln-core/cli/cache/exec and the kiln-sv family), so a dedicated, fully-available
      prefix is used for published package names only — git repo, tags, directory names,
      and the CLI stay "kiln". Publishing follows synth's publish-to-crates-io.yml:
      a v* tag triggers it in parallel with release.yml, auth via the org-wide
      CRATES_IO_TOKEN, a dependency-order publish walker with index-propagation retry,
      and a tag-matches-workspace-version preflight.
    status: planned
    tags: [release, distribution, crates-io, naming, tooling]
    links:
      - type: satisfies
        target: REQ_CRATES_PUBLISH
    fields:
      rationale: >
        Consistency over a one-off rename: prefixing every published crate (not just the
        conflicting kiln-runtime) keeps the namespace coherent and squatter-proof. kilnvm
        ("kiln VM") is compact, brandable, avoids the kiln-wasm-wasi double-noun, and
        kilnvm itself is free as an umbrella crate. Token auth (not OIDC trusted
        publishing) mirrors synth/sigil and reuses the existing org secret.
      alternatives: >
        (1) kiln-wasm-* — descriptive but yields the awkward kiln-wasm-wasi; runner-up.
        (2) Rename only kiln-runtime — rejected, leaves the namespace inconsistent and
        still exposed to the other squatters. (3) Contact owners to transfer kiln-* names
        — rejected as slow/uncertain. (4) OIDC trusted publishing — deferred (per-crate
        registration overhead); revisit later.
      source-ref: "https://github.com/pulseengine/kiln/issues/310"
