# Functional Requirements — Migrated from sphinx-needs
#
# System: Kiln — WebAssembly runtime for safety-critical systems
#
# Migrated from: docs/source/requirements.rst
#
# Status key:
#   implemented — infrastructure exists and works
#   partial     — partially implemented, gaps remain
#   planned     — design exists but no implementation
#   removed     — no longer applicable (with rationale)
#
# Format: rivet generic-yaml

artifacts:
  # =========================================================================
  # Platform & Runtime Architecture
  # =========================================================================
  - id: REQ_PLATFORM_001
    type: requirement
    title: Platform abstraction layer
    description: >
      The runtime shall provide a platform abstraction layer (PAL) with
      distinct backends for target operating systems (macOS, Linux, QNX,
      Zephyr) and bare-metal environments, selectable via compile-time
      features. The PAL shall abstract OS-specific APIs for memory
      allocation/protection and synchronization primitives.
    status: implemented
    tags: [platform, architecture]
    fields:
      implementation: kiln-platform/src/

  - id: REQ_FUNC_001
    type: requirement
    title: Resumable interpreter
    description: >
      The interpreter shall be resumable, allowing operation with fuel or
      other bounded run-time mechanisms that require the interpreter to be
      halted and later resumed as if it was not halted.
    status: implemented
    tags: [runtime, core]
    fields:
      implementation: kiln-runtime/src/stackless/engine.rs

  - id: REQ_FUNC_002
    type: requirement
    title: Baremetal support
    description: >
      The interpreter shall be executable on bare-metal environments with
      no reliance on any specific functionality from the provided execution
      environment, ready for embedding to any environment Rust can compile for.
    status: implemented
    tags: [platform, no-std]
    fields:
      implementation: "All crates support #![no_std]"

  - id: REQ_FUNC_003
    type: requirement
    title: Bounded execution
    description: >
      The interpreter shall yield back control flow eventually, allowing
      users to call the interpreter with a bound and expect a result in
      a finite amount of time or bytecode operations.
    status: implemented
    tags: [runtime, safety]
    fields:
      implementation: kiln-runtime/src/stackless/engine.rs (fuel mechanism)

  - id: REQ_FUNC_033
    type: requirement
    title: Multiple runtime deployment modes
    description: >
      The interpreter shall support multiple runtime deployment modes
      through the kilnd daemon: standard mode (kilnd-std), allocation
      mode (kilnd-alloc), and no-std mode (kilnd-nostd), each with
      appropriate resource limits and safety constraints.
    status: implemented
    tags: [runtime, deployment]
    fields:
      implementation: kilnd/src/

  # =========================================================================
  # WebAssembly Spec Conformance
  # =========================================================================
  - id: REQ_LFUNC_018
    type: requirement
    title: WebAssembly Core Spec 3.0 implementation
    description: >
      The interpreter shall implement the WebAssembly Core Spec 3.0,
      including: module validation, value types and reference types,
      instructions and control flow, function calls and tables, memory
      and data segments, global variables, exception handling (modern
      try_table syntax), and SIMD operations.
    status: partial
    tags: [wasm-core, spec-conformance]
    fields:
      implementation: kiln-runtime/src/stackless/engine.rs
      spec-reference: "WebAssembly Core Spec 3.0 (2025-12-03)"
      note: "~1,500 assert_return failures remain (Issue 149)"

  - id: REQ_FUNC_022
    type: requirement
    title: WAST test suite compatibility
    description: >
      The interpreter shall be testable against the official WebAssembly
      specification (WAST) test suite to ensure conformance and correctness.
    status: partial
    tags: [testing, spec-conformance]
    fields:
      implementation: kiln-build-core/src/wast_execution.rs
      note: "Test runner exists; ~1,600 assertion failures across Issues 146-149"

  # =========================================================================
  # Component Model
  # =========================================================================
  - id: REQ_FUNC_014
    type: requirement
    title: WebAssembly Component Model support
    description: >
      The interpreter shall implement the WebAssembly Component Model
      Preview 2 specification, including: component model validation,
      resource type handling, interface types, component instantiation
      and linking, resource lifetime management, custom section handling,
      and component model binary format parsing.
    status: partial
    tags: [component-model, spec-conformance]
    fields:
      implementation: kiln-component/src/
      spec-reference: "Component Model commit deb0b0a (2025-05-19)"

  - id: REQ_FUNC_021
    type: requirement
    title: Component Model binary format
    description: >
      The interpreter shall strictly implement the WebAssembly Component
      Model binary format including magic bytes, component sections,
      type encoding, import/export handling, core module embedding,
      canonical ABI encoding/decoding, and LEB128 encoding.
    status: partial
    tags: [component-model, decoder]
    links:
      - type: derives-from
        target: REQ_FUNC_014
    fields:
      implementation: kiln-decoder/src/streaming_decoder.rs, kiln-component/src/

  - id: REQ_CMP_020
    type: requirement
    title: Component resource lifecycle management
    description: >
      The component model implementation shall provide comprehensive
      lifecycle management for resource types, ensuring proper creation,
      tracking, and disposal of resources.
    status: partial
    tags: [component-model, resources]
    links:
      - type: derives-from
        target: REQ_FUNC_014
    fields:
      implementation: kiln-component/src/components/resource_management.rs
      note: "Subsumed by STPA requirements SR-12 (no-aliasing) and SR-13 (double-drop)"

  # =========================================================================
  # WASI Support
  # =========================================================================
  - id: REQ_FUNC_015
    type: requirement
    title: WASI logging support
    description: >
      The interpreter shall implement WASI logging with support for all
      defined log levels (Error, Warn, Info, Debug, Trace), context-based
      logging, stderr integration, and thread-safe logging operations.
    status: implemented
    tags: [wasi, logging]
    fields:
      implementation: kiln-wasi/src/dispatcher.rs

  - id: REQ_FUNC_034
    type: requirement
    title: WASI Preview 2 unified dispatch via HostImportHandler
    description: >
      The runtime shall route all WASI calls through the HostImportHandler
      trait (kiln-foundation). The engine shall have no direct dependency
      on kiln-wasi types. WasiDispatcher implements HostImportHandler and
      provides dispatch_core (canonical ABI lowered i32/i64 + memory
      pointers) and dispatch_core_v2 (two-phase allocation for host-side
      cabi_realloc). Both regular import calls and Component Model lowered
      function calls shall use the same host_handler dispatch path. The
      trait interface shall be reusable by external runtimes (meld, synth).
    status: implemented
    tags: [wasi, dispatcher, canonical-abi, cross-repo]
    links:
      - type: derives-from
        target: REQ_FUNC_014
    fields:
      implementation: kiln-wasi/src/dispatcher.rs, kiln-foundation/src/traits.rs
      note: "Dual dispatch path (wasi_dispatcher field) removed 2026-03"

  - id: REQ_FUNC_035
    type: requirement
    title: WASI filesystem access with preopens
    description: >
      The runtime shall implement wasi:filesystem/types and
      wasi:filesystem/preopens interfaces including stat-at, open-at,
      read-via-stream, write-via-stream, get-type, get-directories,
      and resource descriptor lifecycle. Filesystem access shall be
      restricted to pre-opened directories passed via CLI (--wasi-fs).
    status: implemented
    tags: [wasi, filesystem, capability-isolation]
    links:
      - type: derives-from
        target: REQ_FUNC_014
    fields:
      implementation: kiln-wasi/src/dispatcher.rs
      note: "428+ lines of canonical ABI lowered filesystem handlers added 2026-03"

  - id: REQ_FUNC_036
    type: requirement
    title: WASI CLI, clocks, random, and I/O interfaces
    description: >
      The runtime shall implement WASI cli (environment, exit, stdin/stdout/
      stderr, terminal detection), clocks (wall-clock, monotonic-clock),
      random (secure get-random-bytes/u64 and insecure variants), and
      io (streams with blocking-write-and-flush, poll, error) interfaces
      as defined by WASI Preview 2.
    status: implemented
    tags: [wasi, cli, clocks, random, io]
    links:
      - type: derives-from
        target: REQ_FUNC_014
    fields:
      implementation: kiln-wasi/src/dispatcher.rs

  # =========================================================================
  # Low-Level Implementation
  # =========================================================================
  - id: REQ_LFUNC_005
    type: requirement
    title: Stackless implementation
    description: >
      The interpreter shall be stackless, storing the stack of the
      interpreted bytecode in a traditional data structure rather than
      using function calls in the host environment.
    status: implemented
    tags: [runtime, architecture]
    links:
      - type: derives-from
        target: REQ_FUNC_001
    fields:
      implementation: kiln-runtime/src/stackless/

  - id: REQ_LFUNC_006
    type: requirement
    title: No standard library dependency
    description: >
      The interpreter shall be implemented in no_std Rust, only relying
      on functionality provided by core/alloc to enable execution on
      bare environments where no operating system is available.
    status: implemented
    tags: [platform, no-std]
    links:
      - type: derives-from
        target: REQ_FUNC_002
    fields:
      implementation: "All core crates: #![cfg_attr(not(feature = \"std\"), no_std)]"
      note: "kiln-runtime/src/memory.rs has a no_std guard bug (Issue in Stream D)"

  # =========================================================================
  # Advanced Runtime
  # =========================================================================
  - id: REQ_FUNC_030
    type: requirement
    title: Async/await runtime support
    description: >
      The interpreter shall provide async/await runtime support for the
      Component Model, including async canonical lifting/lowering, async
      execution engine with future-based task management, and context
      preservation across async boundaries.
    status: implemented
    tags: [runtime, async]
    fields:
      implementation: kiln-runtime/src/async_runtime.rs

  - id: REQ_FUNC_032
    type: requirement
    title: Debug infrastructure
    description: >
      The interpreter shall provide debugging capabilities including
      DWARF debug information parsing, WIT-aware debugging with source
      mapping, runtime breakpoint management, and stack trace generation.
    status: implemented
    tags: [debugging, tooling]
    fields:
      implementation: kiln-runtime/src/debug/

  - id: REQ_QA_010
    type: requirement
    title: Fuzzing infrastructure
    description: >
      The interpreter shall include fuzzing infrastructure covering
      bounded collections, memory adapters, component model parser,
      type bounds, canonical options, and WIT parser fuzzing.
    status: implemented
    tags: [testing, quality]
    fields:
      implementation: fuzz/

  - id: REQ_VERIFY_010
    type: requirement
    title: Formal verification support
    description: >
      The interpreter shall include support for formal verification
      through Kani proof harness integration, model checking annotations,
      invariant specifications, and bounded verification for critical paths.
    status: implemented
    tags: [verification, formal-methods]
    fields:
      implementation: "Kani proofs in kiln-foundation, kiln-runtime"

  - id: REQ_HELPER_ABI_001
    type: requirement
    title: Helper runtime C ABI exports
    description: >
      The AOT helper runtime (libkiln_helper) shall export a stable C
      ABI including functions for Wasm operations not efficiently inlined
      by the AOT compiler: kiln_memory_copy, kiln_memory_fill,
      kiln_memory_grow, kiln_atomic_wait, kiln_atomic_notify.
    status: planned
    tags: [aot, synth-integration]
    fields:
      note: "Related to BA RFC #46 host-wit-bindgen equivalent"

  # =========================================================================
  # WebAssembly Proposal Conformance — New Instruction Categories
  # =========================================================================
  - id: FR-MEM64
    type: requirement
    title: Memory64 proposal compliance
    description: >
      The interpreter shall implement the Memory64 proposal, including:
      i64 addressing for all load/store and bulk memory operations
      (memory.copy, memory.fill, memory.init, data.drop), u64 offsets
      in memarg encoding, and memory.size/memory.grow returning i64
      for memory64-typed memories. The decoder shall parse the memory64
      flag in memory type definitions and validate that memory indices
      referencing memory64 memories use i64 operands throughout.
    status: planned
    tags: [wasm-core, spec-conformance, memory64]
    traced_to: [H-2]
    links:
      - type: derives-from
        target: REQ_LFUNC_018
    fields:
      implementation: kiln-runtime/src/stackless/engine.rs, kiln-decoder/src/streaming_decoder.rs
      spec-reference: "WebAssembly Memory64 Proposal"
      verification-method: test
      verification-description: >
        All memory64 WAST test files pass (13 files, 5902 assertions);
        memory64 load/store with i64 addresses verified; memory.size and
        memory.grow return i64 for memory64 memories; u64 memarg offsets
        decoded correctly

  - id: FR-ATOMICS
    type: requirement
    title: Threads proposal compliance
    description: >
      The interpreter shall implement the Threads proposal, including:
      shared memory support (shared flag in memory type), all atomic
      load/store operations (i32.atomic.load, i32.atomic.load8_u,
      i32.atomic.load16_u, i64.atomic.load, i64.atomic.load8_u,
      i64.atomic.load16_u, i64.atomic.load32_u, and corresponding
      stores), all atomic read-modify-write operations (add, sub, and,
      or, xor, xchg for i32 and i64 at all widths), atomic compare-
      exchange operations (i32.atomic.rmw.cmpxchg and variants),
      memory.atomic.wait32, memory.atomic.wait64, memory.atomic.notify,
      and atomic.fence. In single-threaded (no_std) mode, atomic
      operations shall execute as regular load/store/RMW operations
      with correct sequential semantics but without real concurrency.
    status: planned
    tags: [wasm-core, spec-conformance, threads, atomics]
    traced_to: [H-1]
    links:
      - type: derives-from
        target: REQ_LFUNC_018
    fields:
      implementation: kiln-runtime/src/stackless/engine.rs
      spec-reference: "WebAssembly Threads Proposal"
      verification-method: test
      verification-description: >
        atomic.wast passes (249 assertions); shared memory creation and
        validation verified; all atomic RMW operations produce correct
        results in single-threaded mode; memory.atomic.wait returns
        immediately in single-threaded mode

  - id: FR-GC
    type: requirement
    title: GC proposal compliance
    description: >
      The interpreter shall implement the GC proposal, including:
      struct and array heap reference types (struct.new, struct.get,
      struct.set, array.new, array.get, array.set, array.len, and
      fixed/default/data/elem variants), the type hierarchy
      (any > eq > i31/struct/array), ref.test and ref.cast type
      testing and casting operations, br_on_cast and br_on_cast_fail
      conditional branching, i31.new and i31.get_s/i31.get_u for
      unboxed 31-bit integers, and extern.internalize/extern.externalize
      for host reference conversion.
    status: planned
    tags: [wasm-core, spec-conformance, gc]
    traced_to: [H-1, H-3]
    links:
      - type: derives-from
        target: REQ_LFUNC_018
    fields:
      implementation: kiln-runtime/src/stackless/engine.rs
      spec-reference: "WebAssembly GC Proposal"
      verification-method: test
      verification-description: >
        GC WAST test files pass; struct create/access/mutate verified;
        array create/access/length verified; type hierarchy subtyping
        checks correct for ref.test/ref.cast; br_on_cast branches
        correctly based on runtime type

  - id: FR-SIMD-EXT
    type: requirement
    title: Relaxed SIMD compliance
    description: >
      The interpreter shall implement the Relaxed SIMD proposal,
      including: relaxed fused multiply-add operations (f32x4.relaxed_madd,
      f32x4.relaxed_nmadd, f64x2.relaxed_madd, f64x2.relaxed_nmadd),
      relaxed lane selection (i8x16.relaxed_laneselect, i16x8.relaxed_-
      laneselect, i32x4.relaxed_laneselect, i64x2.relaxed_laneselect),
      relaxed min/max (f32x4.relaxed_min, f32x4.relaxed_max, f64x2.-
      relaxed_min, f64x2.relaxed_max), relaxed integer truncation
      (i32x4.relaxed_trunc_f32x4_s/u, i32x4.relaxed_trunc_f64x2_s/u_-
      zero), relaxed swizzle (i8x16.relaxed_swizzle), relaxed
      i16x8.relaxed_q15mulr_s, and relaxed dot product
      (i16x8.relaxed_dot_i8x16_i7x16_s, i32x4.relaxed_dot_i8x16_-
      i7x16_add_s). The interpreter shall choose deterministic behavior
      for all edge cases (NaN handling, out-of-range truncation) and
      document which deterministic choice is made for each operation.
    status: planned
    tags: [wasm-core, spec-conformance, simd, relaxed-simd]
    traced_to: [H-1]
    links:
      - type: derives-from
        target: REQ_LFUNC_018
    fields:
      implementation: kiln-runtime/src/stackless/engine.rs
      spec-reference: "WebAssembly Relaxed SIMD Proposal"
      verification-method: test
      verification-description: >
        Relaxed SIMD WAST test files pass; deterministic behavior
        documented for each edge case; fused multiply-add precision
        verified; lane selection semantics verified

  - id: FR-WIDE-ARITH
    type: requirement
    title: Wide arithmetic compliance
    description: >
      The interpreter shall implement the Wide Arithmetic proposal,
      including: i64.add128 (128-bit addition via two i64 operands
      and two i64 results), i64.sub128 (128-bit subtraction),
      i64.mul_wide_s (signed 64x64->128 multiplication), and
      i64.mul_wide_u (unsigned 64x64->128 multiplication). All
      operations shall handle overflow and sign extension correctly
      per the proposal specification.
    status: planned
    tags: [wasm-core, spec-conformance, wide-arithmetic]
    traced_to: [H-1]
    links:
      - type: derives-from
        target: REQ_LFUNC_018
    fields:
      implementation: kiln-runtime/src/stackless/engine.rs
      spec-reference: "WebAssembly Wide Arithmetic Proposal"
      verification-method: test
      verification-description: >
        wide-arithmetic.wast passes (109 assertions); 128-bit addition
        and subtraction carry/borrow verified; signed and unsigned
        widening multiplication verified at boundary values

  - id: FR-CUSTOM-PAGES
    type: requirement
    title: Custom page sizes compliance
    description: >
      The interpreter shall implement the Custom Page Sizes proposal,
      including: page sizes of 1 byte and 65536 bytes (the standard
      Wasm page size), the page size encoded in memory type definitions,
      limits validation respecting the declared page size, memory.size
      returning the size in units of the declared page size, and
      memory.grow growing by the declared page size units. The decoder
      shall parse the custom-page-size annotation in memory types and
      validate that only allowed page sizes (1 and 65536) are used.
    status: planned
    tags: [wasm-core, spec-conformance, custom-page-sizes]
    traced_to: [H-2]
    links:
      - type: derives-from
        target: REQ_LFUNC_018
    fields:
      implementation: kiln-runtime/src/stackless/engine.rs, kiln-decoder/src/streaming_decoder.rs
      spec-reference: "WebAssembly Custom Page Sizes Proposal"
      verification-method: test
      verification-description: >
        custom-page-sizes.wast passes; page size 1 and 65536 both
        validated; memory.size and memory.grow use correct page size
        units; invalid page sizes rejected by decoder

  # =========================================================================
  # RFC #46 Host Intrinsic Requirements
  # =========================================================================
  - id: FR-RFC46-THREAD
    type: requirement
    title: RFC #46 thread intrinsic requirements
    description: >
      The runtime shall implement the RFC #46 thread management intrinsics
      (thread_new, thread_switch_to, thread_index) with the following
      constraints: In single-threaded mode (the current Kiln execution
      model), thread_new shall always return thread_id 0 regardless of
      the context, table, and func arguments. thread_switch_to shall be
      a no-op when called with thread_id 0. thread_index shall always
      return 0. The runtime shall validate that thread_switch_to rejects
      any thread_id other than 0 in single-threaded mode with an explicit
      trap. context0_get and context0_set shall operate on a per-task
      thread-local variable that persists across calls within the same
      task execution.
    status: planned
    tags: [rfc46, thread-intrinsics, component-model]
    traced_to: [H-13, H-13.1, H-13.4]
    links:
      - type: derives-from
        target: REQ_FUNC_014
    fields:
      implementation: kiln-builtins/src/intrinsics/
      spec-reference: "BA RFC #46 — Thread Management intrinsics"
      verification-method: test
      verification-description: >
        thread_new returns 0 in single-threaded mode; thread_switch_to(0)
        is a no-op; thread_switch_to(non-zero) traps; thread_index returns
        0; context0_get/set round-trip values correctly

  - id: FR-RFC46-STREAM
    type: requirement
    title: RFC #46 stream/future intrinsic requirements
    description: >
      The runtime shall implement the RFC #46 stream and future intrinsics
      (stream_<type>_new, stream_<type>_read, stream_<type>_write, and
      corresponding future variants) with bounds-checked buffer access.
      For every stream_read(stream, memory, buffer, length) and
      stream_write(stream, memory, buffer, length) call, the runtime
      shall validate that the range [buffer, buffer + length) falls
      entirely within the bounds of the specified linear memory using
      checked arithmetic (detecting u32/u64 overflow). If the range is
      invalid, the intrinsic shall trap before any data is transferred.
      stream_new shall return a (writer, reader) pair as a packed i64
      value per the RFC encoding. Read/write results shall use the
      COPY_RESULT constants: BLOCKED(0xFFFFFFFF), COMPLETED(0),
      DROPPED(1), CANCELLED(2).
    status: planned
    tags: [rfc46, stream-intrinsics, component-model]
    traced_to: [H-13, H-13.2, H-2]
    links:
      - type: derives-from
        target: REQ_FUNC_014
    fields:
      implementation: kiln-builtins/src/intrinsics/
      spec-reference: "BA RFC #46 — Stream/Future Construction intrinsics"
      verification-method: test
      verification-description: >
        stream_new returns valid writer/reader pair; stream_read with
        valid buffer succeeds; stream_read with out-of-bounds buffer
        traps; stream_write with valid buffer succeeds; buffer + length
        overflow detected and trapped; COPY_RESULT constants correctly
        returned

  - id: FR-RFC46-RESOURCE
    type: requirement
    title: RFC #46 resource intrinsic requirements
    description: >
      The runtime shall implement the RFC #46 resource management
      intrinsics (__wasm_import_<iface>_thing_new, thing_rep, thing_drop)
      with handle validation and double-free prevention. thing_new shall
      allocate a handle from the resource table with a generation counter
      and return a unique handle value. thing_rep shall validate that the
      handle is live (not dropped) and that the generation matches before
      returning the representation value. thing_drop shall validate the
      handle, deallocate the resource, increment the slot's generation
      counter, and mark the slot as free. Calling thing_drop on an
      already-dropped handle shall trap immediately (double-free
      prevention). Calling thing_rep on a dropped handle shall trap.
      Handle values shall encode both slot index and generation to detect
      stale references.
    status: planned
    tags: [rfc46, resource-intrinsics, component-model]
    traced_to: [H-13, H-13.3, H-6]
    links:
      - type: derives-from
        target: REQ_FUNC_014
      - type: derives-from
        target: REQ_CMP_020
    fields:
      implementation: kiln-builtins/src/intrinsics/, kiln-component/src/components/resource_management.rs
      spec-reference: "BA RFC #46 — Resource Management intrinsics"
      verification-method: test
      verification-description: >
        thing_new returns unique handle; thing_rep returns correct
        representation; thing_drop frees resource; double thing_drop
        traps; thing_rep on dropped handle traps; generation counter
        prevents use-after-free

  - id: FR-RFC46-WAITABLE
    type: requirement
    title: RFC #46 waitable set intrinsic requirements
    description: >
      The runtime shall implement the RFC #46 waitable set intrinsics
      (waitable_set_new, waitable_join, waitable_set_wait,
      waitable_set_poll) with deadlock prevention on single-threaded
      runtimes. waitable_set_new shall allocate a new empty waitable set
      and return its identifier. waitable_join shall associate a waitable
      (subtask, stream, or future) with a set and return a join handle.
      waitable_set_poll shall check for ready events without blocking and
      return EVENT_NONE(0) if no events are ready. In single-threaded
      mode, waitable_set_wait shall either behave identically to
      waitable_set_poll (non-blocking) or trap with an explicit error,
      because blocking the sole thread would deadlock the system.
      waitable_set_wait on an empty set (no joined waitables) shall trap
      immediately in all modes. Event codes shall use the defined
      constants: EVENT_NONE(0), EVENT_SUBTASK(1), EVENT_STREAM_READ(2),
      EVENT_STREAM_WRITE(3), EVENT_FUTURE_READ(4), EVENT_FUTURE_WRITE(5),
      EVENT_CANCELLED(6).
    status: planned
    tags: [rfc46, waitable-intrinsics, component-model]
    traced_to: [H-13, H-13.4, H-13.5]
    links:
      - type: derives-from
        target: REQ_FUNC_014
    fields:
      implementation: kiln-builtins/src/intrinsics/
      spec-reference: "BA RFC #46 — Waitable Set Operations intrinsics"
      verification-method: test
      verification-description: >
        waitable_set_new returns valid set id; waitable_join adds
        waitable to set; waitable_set_poll returns EVENT_NONE when no
        events ready; waitable_set_wait on empty set traps; single-
        threaded waitable_set_wait does not block; event codes match
        defined constants

