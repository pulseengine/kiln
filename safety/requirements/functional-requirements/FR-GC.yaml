artifacts:
- id: FR-GC
  type: requirement
  title: GC proposal compliance
  description: |
    The interpreter shall implement the GC proposal, including: struct and array heap reference types (struct.new, struct.get, struct.set, array.new, array.get, array.set, array.len, and fixed/default/data/elem variants), the type hierarchy (any > eq > i31/struct/array), ref.test and ref.cast type testing and casting operations, br_on_cast and br_on_cast_fail conditional branching, i31.new and i31.get_s/i31.get_u for unboxed 31-bit integers, and extern.internalize/extern.externalize for host reference conversion.
  status: proposed
  tags:
  - wasm-core
  - spec-conformance
  - gc
  traced_to:
  - H-1
  - H-3
  links:
  - type: derives-from
    target: REQ_LFUNC_018
  fields:
    implementation: kiln-runtime/src/stackless/engine.rs
    spec-reference: WebAssembly GC Proposal
    verification-method: test
    verification-description: |
      GC WAST test files pass; struct create/access/mutate verified; array create/access/length verified; type hierarchy subtyping checks correct for ref.test/ref.cast; br_on_cast branches correctly based on runtime type
