    target: REQ_FUNC_014
  fields:
    implementation: kiln-runtime/src/async_runtime.rs, kiln-builtins/src/intrinsics/
    spec-reference: 'BA RFC #46 — Waitable Set Operations intrinsics'
    verification-method: test
    verification-description: |
      waitable_set_new returns valid set id backed by gale event group; waitable_join adds waitable to set and returns unique join_id; waitable_join to second set traps; waitable_set_poll returns EVENT_NONE when no events ready; waitable_set_poll on empty set returns EVENT_NONE; waitable_set_wait on empty set traps; waitable_set_wait suspends thread and resumes on event; waitable_set_wait returns correct (event_type, join_id) pair; event codes match defined constants; gale event group correctly aggregates readiness from streams, futures, and subtasks; watchdog timeout prevents permanent blocking on gale
