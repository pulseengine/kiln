artifacts:
- id: FR-WIDE-ARITH
  type: requirement
  title: Wide arithmetic compliance
  description: |
    The interpreter shall implement the Wide Arithmetic proposal, including: i64.add128 (128-bit addition via two i64 operands and two i64 results), i64.sub128 (128-bit subtraction), i64.mul_wide_s (signed 64x64->128 multiplication), and i64.mul_wide_u (unsigned 64x64->128 multiplication). All operations shall handle overflow and sign extension correctly per the proposal specification.
  status: proposed
  tags:
  - wasm-core
  - spec-conformance
  - wide-arithmetic
  traced_to:
  - H-1
  links:
  - type: derives-from
    target: REQ_LFUNC_018
  fields:
    implementation: kiln-runtime/src/stackless/engine.rs
    spec-reference: WebAssembly Wide Arithmetic Proposal
    verification-method: test
    verification-description: |
      wide-arithmetic.wast passes (109 assertions); 128-bit addition and subtraction carry/borrow verified; signed and unsigned widening multiplication verified at boundary values
