artifacts:
- id: REQ_FUNC_034
  type: requirement
  title: WASI Preview 2 unified dispatch via HostImportHandler
  description: |
    The runtime shall route all WASI calls through the HostImportHandler trait (kiln-foundation). The engine shall have no direct dependency on kiln-wasi types. WasiDispatcher implements HostImportHandler and provides dispatch_core (canonical ABI lowered i32/i64 + memory pointers) and dispatch_core_v2 (two-phase allocation for host-side cabi_realloc). Both regular import calls and Component Model lowered function calls shall use the same host_handler dispatch path. The trait interface shall be reusable by external runtimes (meld, synth).
  status: implemented
  tags:
  - wasi
  - dispatcher
  - canonical-abi
  - cross-repo
  links:
  - type: derives-from
    target: REQ_FUNC_014
  fields:
    implementation: kiln-wasi/src/dispatcher.rs, kiln-foundation/src/traits.rs
    note: Dual dispatch path (wasi_dispatcher field) removed 2026-03
