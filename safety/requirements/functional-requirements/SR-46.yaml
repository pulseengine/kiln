artifacts:
- id: SR-46
  type: requirement
  title: kilnd rejects an over-cap declared memory min BEFORE eager allocation (pre-instantiate)
  status: proposed
  description: 'The SR-43 reject-at-load runs POST-instantiate, so Memory::new eagerly allocates the declared min pages before the rejection fires — the --memory cap is transiently bypassed and a hostile module forces multi-GB allocation then exits "rejected" (memory-exhaustion DoS). Measured: (memory 40000) under --memory 65536 resident-allocates ~5.3GB RSS before rejecting (vs ~55MB baseline). This is the documented SR-43 follow-up ("rejecting before eager min allocation needs a pre-instantiate engine API"). Fix: build the store ResourceLimiter (memory_growing, consulted for the INITIAL allocation too) from config.max_memory so an over-cap min is denied at Memory::new time, or check declared min against the cap before instantiate. Relates to SR-43, SR-41. AD-WCMC-001. Issue #436.'
  tags:
  - kilnd
  - memory
  - resource-limit
  - reject-at-load
  - dos
  - bug
  fields:
    upstream-ref: https://github.com/pulseengine/kiln/issues/436
  provenance:
    created-by: ai
    model: claude-fable-5
    timestamp: 2026-07-16T19:40:00Z
  release: v0.5.0
