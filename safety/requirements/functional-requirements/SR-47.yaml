artifacts:
- id: SR-47
  type: requirement
  title: kilnd actually bounds table memory (wire the dead SR-44 setter + reject oversized table min)
  status: proposed
  description: 'SR-44 landed the Table::set_runtime_max_elements MECHANISM but it was NEVER WIRED into kilnd — the setter has ZERO live callers (only #[test] fns at table.rs:977,1005), so runtime_max_elements stays 0 (=unlimited) and the grow guard never fires. There is also no reject-at-load for an oversized table min (unlike memory). Measured: (table 100000000 funcref), 45 bytes, under --memory 65536 → peak RSS 3.02GB, exit 0 (silent); table.grow of 80M elements → 2.43GB, exit 0. ~70-million-x amplification. This is the #411/#412 pattern (a cap mechanism that exists but is never called) applied to tables — SR-44 is vacuously verified. Fix: (a) derive a max-elements bound from --memory (or a new --table cap); (b) reject-at-load when a declared table min exceeds it (mirror SR-43 memory path); (c) call set_runtime_max_elements on each instantiated table so the existing grow guard fires. Relates to SR-44, SR-41. AD-WCMC-001. Issue #439.'
  tags:
  - kilnd
  - kiln-runtime
  - table
  - resource-limit
  - dead-code
  - dos
  - bug
  fields:
    upstream-ref: https://github.com/pulseengine/kiln/issues/439
  provenance:
    created-by: ai
    model: claude-fable-5
    timestamp: 2026-07-16T19:40:00Z
