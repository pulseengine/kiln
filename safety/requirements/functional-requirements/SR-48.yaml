artifacts:
- id: SR-48
  type: requirement
  title: kilnd caps/rejects/reports ALL memories, not just memory index 0
  status: implemented
  description: 'IMPLEMENTED (PR #444): the pre-instantiate gate bounds TOTAL declared minimums across ALL memories (not memory(0) alone), runtime grow caps are applied to EVERY memory, ModuleInstance::memory_count() lets hosts iterate them, and kilnd sums peak usage across all memories. Verified on the real binary: (memory 1)(memory 40000) under --memory 65536 went 2.48GB/exit-0/fabricated-peak -> 3.7MB/rejected. Tests: multi_memory_total_declared_min_gated, multi_memory_min_over_cap_rejected_at_load, multi_memory_peak_reporting_sums_all_memories. --- The SR-41 runtime cap, the SR-43 reject-at-load, and the SR-42 peak reporting all operate on inst.memory(0) ONLY (kilnd/src/lib.rs:874 gate, :968/:975 peak). A WASM multi-memory module placing an oversized min on memory index >=1 escapes the cap entirely: eager allocation, exit 0 (silent — worse than the single-memory #436 which at least exits 1), and a fabricated peak ("Peak memory: 65536 bytes" while 2.48GB is resident). Measured: (memory 1)(memory 40000) under --memory 65536 → 2.48GB RSS, exit 0. Fix: iterate all inst.memory(i) for the SR-41 cap, the SR-43/SR-46 reject-at-load, and the SR-42 peak sum — or bound total pages across all memories against --memory. Relates to SR-41, SR-42, SR-43, SR-46. AD-WCMC-001. Issue #440.'
  tags:
  - kilnd
  - memory
  - multi-memory
  - resource-limit
  - dos
  - bug
