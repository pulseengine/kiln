artifacts:
- id: SR-52
  type: requirement
  title: The component library API resolves exports without panicking (no .expect())
  status: verified
  description: 'VERIFIED (PR #445): the defect was already FIXED INCIDENTALLY — the #344 / AD-COMPONENT-HOST-001 direct-component-hosting work replaced the placeholder that built the sometimes-failing ComponentType::unit(...) signature (whose .expect() escalated BoundedVec code 1005 into a process abort) with real signature resolution from the canon lift. Re-verified rather than assumed, per "trust the binary not the done-flag": (1) grep confirms ZERO .expect() in production code of component_instantiation.rs (the only 3 are test fixtures at ~5545); (2) resolve_exports (now ~2865) resolves the real signature and no longer builds the unit placeholder; (3) NEW regression test kiln-component/tests/library_api_panic_contract_tests.rs drives the exact entry point #427 names (ComponentInstance::from_parsed_library) against a Sort::Function-exporting component and asserts it RETURNS rather than aborting — passes on main. Caveat: the fixture is a minimal single-function-export component; #427''s reporter used a spar-codegen''d wasip2 reactor with host imports, so a differently-shaped component could still surface an unrelated error (but the specific .expect() defect is structurally gone). NOTE the test must run via workspace feature unification — see the kiln-component isolated-build bit rot filed separately. --- resolve_exports still panics via .expect() at component_instantiation.rs:2804 — the #269/#271 panic-contract fix (a library must return Err, not panic, on malformed input) is incomplete for the library API surface. A crafted/malformed component reaching this path aborts the host process instead of returning a kiln_error::Result. Fix: replace the .expect() with a fail-loud Err (Error::component_* factory) per the CLAUDE.md no-panic-in-library rule; add a regression test that drives the library API with the triggering input and asserts Err, not a panic. Relates to the #269/#271 panic-contract work. Issue #427.'
  tags:
  - kiln-component
  - panic-contract
  - library-api
  - bug
