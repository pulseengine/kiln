# Roadmap / Not-Yet-Implemented Requirements
#
# System: Kiln — WebAssembly runtime for safety-critical systems
#
# These are captured from GitHub issues that describe capabilities Kiln does
# NOT directly have today. Rather than leave them as open issues (noise) or
# lose them (forgotten intent), they are recorded here as `planned`
# requirements so they remain traceable and can be scheduled when a concrete
# driver (a real target, a customer, a mission) appears.
#
# ── Release roadmap (next 5; mirrored to GitHub milestones) ────────────────
# Source of truth for scope: `release-vX.Y` tags (query: rivet list --filter
# '(has-tag "release-v0.4.0")'). v0.3.2 SHIPPED (kiln-async scheduler core).
#   v0.3.3  Interpreter GC-subtyping conformance — fix the ref-type subtyping
#           relation; drive down the 332 WAST failures (issues #149, #146).
#   v0.4.0  kiln-async embedded P3 integration — host-future RawWaker bridge
#           (R1, the one ASIL-D unsafe) + synth-lowered async module end-to-end
#           (REQ_ASYNC_SCHED Phase-1 exit).
#   v0.5.0  crates.io publishing — kilnvm-* rename + synth-modeled pipeline
#           (REQ_CRATES_PUBLISH / AD-PUBLISH-001 / #310).
#   v0.6.0  kiln-async streams + backpressure (Phase 2) — Stream<T> + credits,
#           error-context (remaining stubbed intrinsics).
#   v0.7.0  Verification + CI hardening — Verus invariant gating + refinement
#           link (#280), re-enable disabled workflows (#237), pre-commit (#238),
#           dynamic-verification stack (REQ_ASYNC_BENCH).
# WAST conformance (v0.3.3) is tracked via AC-WAST + the FUNC WAST requirement.
#
# status: planned — design/intent exists, no implementation. Promote to
#         `partial`/`implemented` (in functional-requirements.yaml) when built.
#
# Format: rivet generic-yaml

artifacts:
  # =========================================================================
  # P3 Component Model — async & instantiation (not yet implemented)
  # =========================================================================
  - id: REQ_P3_LIBCOMP
    type: requirement
    title: P3 library component instantiation (InlineExports)
    description: >
      The runtime shall instantiate P3 async *library* components whose
      exports reference not-yet-instantiated source instances (InlineExports).
      Today these fail with "InlineExports source instance not instantiated".
    status: proposed
    tags: [component-model, p3, instantiation, roadmap]
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/211"

  - id: REQ_P3_CALLBACK
    type: requirement
    title: P3 callback lifting mode for single-stack embedded execution
    description: >
      The runtime shall support the P3 callback async-lifting mode (host calls
      an exported callback per event, no persistent per-call stack) so async
      components can run single-stack on Gale/embedded targets, in addition to
      the stackful mode.
    status: proposed
    tags: [component-model, p3, async, embedded, roadmap]
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/232"

  # =========================================================================
  # WebAssembly GC / typed-reference validation (ahead of demand)
  # =========================================================================
  - id: REQ_GC_NULLABILITY
    type: requirement
    title: GC / typed-reference nullability validation
    description: >
      The validator shall track non-null vs nullable reference types across the
      full GC lattice (funcref/externref/exnref/anyref/eqref/i31/struct/array
      and typed function references) with correct subtyping. Deferred: no
      current target emits WASM GC — falcon (relay) and wohl use only numeric +
      linear-memory core wasm with MVP funcref tables. Required only when a
      WASM-GC-emitting toolchain (Kotlin/Scala/Java/OCaml→wasm-GC) becomes a
      target. See PR #234 research for evidence.
    status: proposed
    tags: [validator, wasm-gc, reference-types, deferred, roadmap]
    links:
      - type: derives-from
        target: REQ_LFUNC_018
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/pull/234"

  # =========================================================================
  # cFS (NASA Core Flight System) host extensions — flight-software patterns
  # =========================================================================
  - id: REQ_CFS_SB
    type: requirement
    title: cFS Software Bus as host routing layer
    description: >
      Kiln shall provide a publish/subscribe message-routing host layer modeled
      on NASA cFS Software Bus (route by MsgId to subscriber pipes) for inter-
      component dispatch of WASM components.
    status: proposed
    tags: [cfs, host-extension, messaging, roadmap]
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/226"

  - id: REQ_CFS_ES
    type: requirement
    title: cFS Executive Services subset as host extensions
    description: >
      Kiln shall provide a host-native subset of NASA cFS Executive Services —
      application lifecycle, Critical Data Store (persistent across resets),
      startup scripts, performance logging — building on ComponentLinker.
    status: proposed
    tags: [cfs, host-extension, lifecycle, roadmap]
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/227"

  - id: REQ_CFS_EVS
    type: requirement
    title: cFS Event Services as host extension
    description: >
      Kiln shall provide host-native structured event emission with severity
      levels, per-event filtering masks, and distribution via the Software Bus,
      modeled on NASA cFS Event Services.
    status: proposed
    tags: [cfs, host-extension, events, roadmap]
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/228"

  - id: REQ_CFS_TIME
    type: requirement
    title: cFS Time Services as host extension
    description: >
      Kiln shall provide host-native spacecraft time correlation (UTC, TAI,
      Mission Elapsed Time, Spacecraft Time Correlation Factor) for WASM
      components, modeled on NASA cFS Time Services.
    status: proposed
    tags: [cfs, host-extension, time, roadmap]
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/229"

  - id: REQ_CFS_ARCH
    type: requirement
    title: cFS-on-WASM reference architecture
    description: >
      Kiln shall provide a reference architecture mapping NASA cFS flight-
      software patterns (PSP -> OSAL -> cFE -> Apps) onto the PulseEngine stack
      (kiln-platform -> WASI/Gale -> Kiln host services -> WASM components) as
      P3 async components.
    status: proposed
    tags: [cfs, architecture, reference, roadmap]
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/231"

  # =========================================================================
  # Host-side performance infrastructure
  # =========================================================================
  - id: REQ_PERF_LOCKFREE
    type: requirement
    title: Lock-free zero-copy pipeline buffers
    description: >
      Inter-phase/inter-component data flow shall offer lock-free, zero-copy
      ring buffers (LMAX Disruptor / GNU Radio 4.0 pattern) with pre-allocated
      storage and sequence barriers, avoiding dynamic allocation and lock
      contention on hot paths.
    status: proposed
    tags: [performance, lock-free, zero-copy, roadmap]
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/223"

  - id: REQ_PERF_SIMD
    type: requirement
    title: SIMD capability cascade for host-side paths
    description: >
      Performance-critical host-side paths (e.g. sigil crypto, pattern
      matching) shall use a runtime SIMD capability cascade
      (NEON/AVX512/AVX2/AVX/SSE/portable) selected by detected CPU features,
      following the liquid-dsp pattern.
    status: proposed
    tags: [performance, simd, host, roadmap]
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/224"

  # =========================================================================
  # Async runtime — clean-room no_std/no_alloc cooperative scheduler
  # =========================================================================
  - id: REQ_ASYNC_SCHED
    type: requirement
    title: Verified no_std/no_alloc cooperative async scheduler (kiln-async)
    description: >
      The embedded base shall provide a cooperative async scheduler backing the
      WASM Component Model P3 async ABI (task/stream/future/waitable-set,
      credit-based backpressure) for synth-compiled targets on gale/Zephyr/
      Cortex-M. It shall be no_std with NO alloc (fixed-capacity bounded
      structures only), fuel-bounded (poll slice = a fuel budget, integrating
      kiln's per-instruction fuel metering), and formally verified: Verus for
      queue/table/FSM invariants on the real Rust, and Lean+Aeneas refinement
      reusing spar's complete EDF/RM/RTA proofs for termination, bounded latency
      (WCRT), and schedulability. Replaces the deleted ~32k-LOC simulation
      module (kiln-component/src/async_/) which contradicted RFC #46 and was
      never integrated. Design: docs/architecture/async-scheduler-plan.md.
      Phase 0 scaffold landed (kiln-async crate: types, FSM, bounded ready
      queue; intrinsics stubbed; builds no_std/no_alloc for thumbv7em).
    status: implemented
    release: v0.5.0
    tags: [async, scheduler, no-std, no-alloc, embedded, formal-verification, roadmap, release-v0.4.0]
    links:
      - type: derives-from
        target: REQ_FUNC_003
    fields:
      design-doc: docs/architecture/async-scheduler-plan.md
      upstream-ref: "https://github.com/pulseengine/kiln/issues/230"
      release-plan: >
        Shipped in incremental releases, not one big-bang (see plan §7a):
        v0.3.2 = scheduler-core library (task FSM, table, ready queue, poll_round,
        futures, waitable-set, task-control + future.* intrinsics);
        v0.4.0 = embedded P3 integration (host-future RawWaker bridge R1 +
        synth-lowered end-to-end, the original Phase-1 exit);
        v0.5.0 = streams/backpressure; v0.6.0+ = Verus gating, priority/EDF,
        Lean refinement, hardening.
      note: >
        Supersedes issues #225 (scheduler strategies), #230 (P3 async intrinsics),
        #233 (P3 async primitives), #239 (loom concurrency harnesses) — closed
        into this single scoped requirement. Verification follows the gale
        Verus+Lean template; reuses spar/proofs/Proofs/Scheduling/{EDF,RMBound,RTA}.lean.

  - id: REQ_ASYNC_BENCH
    type: requirement
    title: Performance benchmarks and dynamic-verification stack for kiln-async
    description: >
      The kiln-async scheduler shall carry a measurable performance baseline
      and a dynamic-verification stack alongside its formal proofs. (1) Host
      criterion micro-benchmarks shall cover every scheduler primitive
      (spawn/remove/transition, ready-queue push/pop, and the poll round once
      Phase 1 lands) so the documented O(1) bounds are measured, not asserted,
      and regressions are visible per-commit. (2) The fuel→cycles constant
      needed for WCRT claims (plan risk R4) shall be measured on target
      hardware, not estimated. (3) Dynamic verification shall complement the
      Verus/Lean proofs per the defense-in-depth strategy: property-based
      tests over the FSM and queue invariants, fuzzing of the intrinsic
      surface, Kani on array-index helpers, and mutation testing of the
      scheduler core.
    status: implemented
    release: v0.7.0
    tags: [async, scheduler, performance, benchmarks, no-std, embedded, roadmap, release-v0.7.0]
    links:
      - type: derives-from
        target: REQ_ASYNC_SCHED
    fields:
      design-doc: docs/architecture/async-scheduler-plan.md
      note: >
        Phase 1 of the plan carries the criterion baseline (host, std bench
        units over the no_std lib); on-target fuel→cycles measurement and the
        fuzz/Kani/mutation layers land with plan Phase 6 (hardening).

  - id: REQ_ASYNC_EXTWAKE
    type: requirement
    title: External wake-up path for parked tasks (event source → mark_ready)
    description: >
      kiln-async must let a task wait on a REAL external event and be resumed
      later. Today `Scheduler::mark_ready(TaskId)` exists and is public, and a
      task ends its slice with `TaskOutcome::Waited` to park (Blocked), but
      mark_ready is only ever driven by INTERNAL scheduler events — channel/
      stream readiness resolved within `poll_round` (kiln-async/src/lib.rs
      mark_ready call sites are all intra-poll). There is no sanctioned path for
      an OUT-OF-LOOP event source (timer ISR, hardware IRQ, host callback, gale
      event-group signal) to wake a parked task, so "wait on a real event, be
      woken later" is not achievable today (benchmark Finding 8; the
      TaskOutcome::Waited doc). Deliver a sound external-wake API that preserves
      the crate invariants (no_std, NO alloc, #![forbid(unsafe_code)], fuel-
      bounded, O(1)): an out-of-loop producer records a pending wake for a TaskId
      that the next poll_round drains, with an explicitly documented concurrency
      model (single-threaded cooperative baseline; the ISR/multi-core story and
      any required synchronization stated, not assumed). This is the runtime-side
      counterpart the host Waker bridge (REQ_ASYNC_WAKERBRIDGE) calls into.
    status: proposed
    release: v0.5.0
    tags: [async, scheduler, no-std, no-alloc, embedded, wake, roadmap]
    links:
      - type: derives-from
        target: REQ_ASYNC_SCHED
    fields:
      design-doc: docs/architecture/async-scheduler-plan.md
      note: >
        Gap surfaced by the kiln-async vs embassy benchmark (REQ_ASYNC_BENCH):
        the bench's futures only self-wake synchronously inline because no real
        external-wake path exists. mark_ready is already the safe primitive; this
        requirement is the plumbing + concurrency model that feeds it from
        outside poll_round.

  - id: REQ_ASYNC_WAKERBRIDGE
    type: requirement
    title: Official host-side core::task::Future/Waker bridge (std-only, outside the cert crate)
    description: >
      Provide an OFFICIAL, production-sound bridge that drives general Rust
      `core::task::Future`s (that store/clone their `Waker` for a real later
      event) on the kiln-async scheduler — for host/std use only. kiln-async
      itself is `#![forbid(unsafe_code)]` PERMANENTLY and deliberately never
      polls a Rust Future nor builds a `RawWaker` vtable (lib.rs design invariant;
      the R1 unsafe waker is explicitly descoped from the cert crate as a
      std-only convenience). The bridge built for the executor-comparison
      benchmark is explicitly UNOFFICIAL / non-production: it is sound ONLY for
      futures that self-wake synchronously inline (e.g. CooperativeYield), NOT
      for general futures that store/clone the Waker to signal readiness later
      (benchmark Finding 1 + the bench bridge doc comment). Deliver this as a
      SEPARATE std-only companion crate (e.g. kiln-async-host) that MAY use
      `unsafe` for the RawWaker vtable and whose `Waker::wake()` routes to the
      external-wake path (REQ_ASYNC_EXTWAKE). It must live OUTSIDE kiln-async so
      the embedded/synth-lowered cert scope keeps forbid(unsafe_code) and its
      minimal TCB.
    status: proposed
    release: v0.6.0
    tags: [async, scheduler, host, std, future, waker, unsafe, roadmap]
    links:
      - type: derives-from
        target: REQ_ASYNC_SCHED
      - type: depends-on
        target: REQ_ASYNC_EXTWAKE
    fields:
      note: >
        Not a defect in kiln-async — a deliberately-excluded feature. The R1
        "unsafe waker" mentioned in REQ_ASYNC_SCHED's release-plan belongs here,
        in a std-only companion, NOT in the forbid(unsafe) cert crate. Gap
        surfaced by REQ_ASYNC_BENCH's throwaway bridge.

  - id: REQ_CRATES_PUBLISH
    type: requirement
    title: Publish the workspace to crates.io (kilnvm-* namespace)
    description: >
      The kiln workspace shall be publishable to crates.io so downstream users can
      depend on the runtime/scheduler libraries by version, not just consume the
      signed GitHub release artifacts. Published package names use the kilnvm-*
      prefix (the bare kiln-* namespace is contested by unrelated owners); the
      publish pipeline is modeled on synth's publish-to-crates-io.yml (v* tag
      trigger parallel to release.yml, org CRATES_IO_TOKEN, dependency-order walker
      with index-propagation retry, tag-matches-version preflight).
    status: proposed
    release: v0.5.0
    tags: [release, distribution, crates-io, roadmap, release-v0.5.0]
    links:
      - type: derives-from
        target: REQ_FUNC_003
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/310"
      note: >
        Next-release item — NOT v0.3.2 (which ships as a GitHub signed release only).
        Naming + workflow decision captured in AD-PUBLISH-001. Verified 2026-06-14:
        20/21 kiln-* names free but kiln-runtime taken (zenvanexus); all kilnvm-*
        target names available.

  - id: REQ_WITNESS_COV
    type: requirement
    title: Witness MC/DC coverage backend — post-run global snapshot + harness mode
    description: >
      Kiln shall act as a coverage backend for the witness MC/DC tool so that
      instrumented WebAssembly artifacts can be measured under a certifiable,
      deterministic runtime (and differentially cross-checked against wasmtime
      as oracle). witness instruments core modules by adding exported mutable
      globals (__witness_counter_<id>) and reconstructs MC/DC truth tables from
      their post-run values; wasmtime's component API exposes no way to read an
      inner core's globals, so kiln — which already decodes/instantiates core
      modules + Component-Model + WASI 0.2 and reads globals internally — is the
      enabling runtime. Three concrete capabilities: (1) a post-run
      exported-global SNAPSHOT API keyed by export name (or by the
      __witness_counter_* prefix) returning name->integer, reachable from a host
      driver; (2) a kilnd HARNESS mode (CLI flag and/or WITNESS_MODULE /
      WITNESS_MANIFEST / WITNESS_OUTPUT env vars) that instantiates + runs the
      module, invokes the specified export(s), then writes the counter snapshot
      in witness's counter-snapshot JSON shape; (3) a documented inventory of
      which wasi:0.2 interfaces are real vs. need no-op stubbing, since coverage
      runs only require imports satisfied enough that branches execute (correct
      WASI behaviour is NOT required). Near-term scope is SYNCHRONOUS
      Component-Model coverage; p3 async-lift/streams are explicitly out of scope
      (gated on p3 execution maturity; tracked as witness REQ-057 / witness#107B).
    status: verified
    release: v0.3.4
    tags: [verification, mcdc, witness, coverage, cross-tool, roadmap, release-v0.4.0]
    links:
      - type: derives-from
        target: REQ_VERIFY_010
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/340"
      cross-ref: "pulseengine/witness#110 (strategy + dual-runtime cross-check); witness DEC-003 (counter mechanism); witness REQ-054/FEAT-034 (meld composition)"
      feasibility: >
        Grounded against the code (2026-06-20): the hard part already exists.
        ModuleInstance::global_by_name (kiln-runtime/src/module_instance.rs:306)
        + GlobalWrapper::get (module.rs:4291) already read exported globals by
        name on a live core instance; Export metadata (name/kind/index,
        ExportKind::Global) is a DirectMap lookup (module.rs:2823). witness's
        own pipeline runs `meld fuse component.wasm -o core.wasm` first, so the
        instrumented artifact is a CORE module — the global_by_name path applies
        directly, no live-component global traversal needed for the primary
        path. NEW work is mostly wiring + serialization: a prefix-keyed snapshot
        accessor, a kilnd --harness / env-var mode emitting witness's JSON shape,
        and the wasi:0.2 stub inventory (filesystem/cli/clocks/io/random are
        implemented; coverage cores want no-op stubs). Component-with-live-core
        global traversal is a later phase (nested-instance lookup) only if a
        non-fused component path is needed.
      regime-note: >
        Keystone for AD-MCDC-001: once kiln is a witness coverage backend it can
        run its OWN meld-fused components through itself + witness for MC/DC,
        closing the witness step of the pulseengine-feature-loop for kiln itself
        (dogfooding the same regime spar/synth/witness already follow).
      release-note: >
        Tagged release-v0.4.0 but INDEPENDENT of the kiln-async P3 track; mostly
        additive wiring, so a candidate to pull forward as a focused sub-release
        if witness's MC/DC-on-kiln work is gated on it. Release assignment is a
        planning call (see release-planning).
      harness-contract: >
        Pinned with witness (avrabe, 2026-06-20, #340) against witness's
        crates/witness-core/src/run_record.rs HarnessSnapshot + crates/witness/
        src/run.rs run_via_harness. TARGET witness-harness-v1 (branch coverage;
        v2 MC/DC rows are later — do NOT build yet). (a) JSON the harness writes
        to WITNESS_OUTPUT: {"schema":"witness-harness-v1","counters":{"<id>":N}}
        where keys are the BARE numeric branch id as a string ("0","1"; witness
        does key.parse::<u32>()) — i.e. the harness reads each exported global
        named __witness_counter_<id>, STRIPS the __witness_counter_ prefix, and
        emits <id>->value; value is the hit count (counters are i64 globals as of
        witness v0.32+, overflow-safe). No run-id/hash/manifest in the snapshot —
        witness stamps those itself. (b) Invocation: witness spawns the harness
        via sh -c, passing only env vars — WITNESS_MODULE (abs path to the
        instrumented .wasm, READ this), WITNESS_MANIFEST (abs path, optional for
        v1), WITNESS_OUTPUT (abs path the harness MUST write). Module path is NOT
        a CLI arg. witness's own --invoke is ignored in harness mode — the harness
        chooses which export(s) to run (e.g. _start or named fixture exports),
        then snapshots counters at the end. Non-zero exit or a missing
        WITNESS_OUTPUT file = harness failure.
      progress: >
        Phase 1 DONE: host-reachable post-run snapshot accessor
        ModuleInstance::export_global_snapshot(prefix) -> BTreeMap<name,i64>,
        prefix-filtered, integer-typed, fail-loud on a non-integer matching
        global. Kept keyed by FULL export name (general accessor); the witness-v1
        prefix-strip + JSON envelope is the Phase-2 serialization concern. TDD:
        2 tests (kiln-runtime/tests/witness_snapshot_test.rs), mutation-proven.
        Phase 2 DONE: kilnd witness-harness mode (kilnd/src/witness_harness.rs).
        When witness invokes kilnd with WITNESS_MODULE + WITNESS_OUTPUT set,
        harness_requested() routes main to run_from_env() -> run(): load the
        meld-fused core (fail-loud if a Component), instantiate, invoke the first
        existing entry of [_start, run, 0, 1, main], snapshot __witness_counter_*,
        and write {"schema":"witness-harness-v1","counters":{"<id>":N}} (prefix
        stripped to the bare numeric id witness parses; numeric-ordered) to
        WITNESS_OUTPUT; non-zero exit on failure per the contract. TDD: 4 tests
        (3 unit on build_counters_json incl. numeric-order + fail-loud non-numeric;
        1 integration over run(), mutation-proven by skipping execute). Verified
        end-to-end against the real binary: wasm-tools-built instrumented core
        run via the env contract emitted {"0":3,"1":0}, exit 0. REMAINING (Phase
        3, follow-up): wasi:0.2 no-op stub inventory for syscall-heavy fused cores
        (filesystem/cli/clocks/io/random implemented today; unsatisfied imports
        currently fail-loud at instantiate); witness-harness-v2 per-row MC/DC
        (deferred by witness). Dual-runtime cross-check (witness#110) can begin.

  - id: REQ_COMPONENT_HOST
    type: requirement
    title: Host external composed Component-Model components in kilnd + invoke an export
    description: >
      The std reference host (kilnd, interpreter-QM variant) shall load an
      external wac-composed Component-Model component, instantiate it, and invoke
      a named export with scalar args, lifting the scalar result through the
      canonical ABI. Concretely: a `--component <file>` + `--invoke '<export>'`
      entry that runs e.g. gale's kiln-component-host demo (gale#63: a gale app
      composed with the gale-kiln host via wac, `run-demo() -> u32 = 53`) directly
      on kiln — the safety-critical target host — not only on wasmtime. This is
      the DIRECT-HOSTING half of the dual capability (the meld-fuse-to-core half
      already works: components lowered by Meld at build time run as core modules,
      the embedded-cert path). Both paths are supported per AD-COMPONENT-HOST-001;
      this requirement covers the direct-hosting (QM) half. Kill-criterion: kilnd
      cannot instantiate + invoke an export of a wac-composed component.
    status: verified
    release: v0.3.5
    tags: [component-model, host, kilnd, canonical-abi, qm, cross-tool, roadmap, release-v0.4.0]
    links:
      - type: derives-from
        target: REQ_FUNC_002
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/344"
      cross-ref: "gale#63 (gale kiln-component-host path; composed demo fixture)"
      decision: AD-COMPONENT-HOST-001
      current-state: >
        Grounded 2026-06-20: the machinery is present and compiled into the
        DEFAULT kilnd (component-model is a default feature pulling kiln-component
        + kiln-decoder; ~31k LOC; only the async surface src/async_ was removed per
        SM-ASYNC-002). kilnd's run dispatch (main.rs:996) already ATTEMPTS
        execute_component; the RFC #46 "meld fuse first" message (main.rs:1000-1011)
        is a fallback-on-failure, not an unconditional block. kiln-component
        decode/instantiate/call_function are real (returns Vec<ComponentValue>).
        TWO real gaps for run-demo()->u32=53: (1) no --invoke flag (entry hard-coded
        to wasi:cli/run@*), (2) canon.lift is NOT_IMPLEMENTED
        (kiln-component/src/canonical_executor.rs:108-125) — a core scalar result
        is not lifted to a ComponentValue.
      scope-note: >
        DIRECT hosting is QM/reference scope (kilnd, SM-PERF-001 reference runtime).
        The embedded-cert path stays meld-fuse-only (RFC #46 / SM-ASYNC-002 apply
        there). See AD-COMPONENT-HOST-001 for the both-paths reconciliation.

  - id: REQ_COMPONENT_RUN
    type: requirement
    title: Run a command component via its wasi:cli/run canonical entry (multi-core)
    description: >
      The std reference host (kilnd, interpreter-QM variant) shall execute a
      `--component` command component through its component-level
      `wasi:cli/run@0.2.x` canonical entry — resolving that interface export's
      `run` function to its backing core function (in whichever core module the
      canon-lift wraps) and invoking it — regardless of how the component's core
      modules are decomposed. In particular a meld-fused multi-core command
      component, where no single core module exports `_start` and the start is
      deferred to a caller/fixup core module, shall run the way wasmtime runs it,
      rather than failing when kilnd searches core instances for a `_start`
      export. This drives the Component-Model export (not a core `_start`
      assumption) and unblocks the meld -> kiln seam (meld#297, the jess/gale
      pipeline). Kill-criterion: kilnd fails to run a validly-composed
      `wasi:cli/run` command component solely because no core module exports
      `_start`.
    status: verified
    release: v0.3.5
    tags: [component-model, host, kilnd, wasi-cli-run, canonical-abi, qm, cross-tool, roadmap, release-v0.4.0]
    links:
      - type: derives-from
        target: REQ_COMPONENT_HOST
    fields:
      upstream-ref: "https://github.com/pulseengine/kiln/issues/364"
      cross-ref: "meld#297 (meld -> kiln seam; the jess/gale pipeline)"
      decision: AD-COMPONENT-HOST-001
      current-state: >
        Grounded 2026-07-02 (issue #364): kilnd's interface-style main-handle
        selection (kiln-component/src/components/component_instantiation.rs)
        searched core instances for a `_start`/`run` NAME and errored
        `[Runtime][E03ED] No core instance exports _start` when no single core
        module exposed one — which is the meld-fused multi-core case. hello_c_cli
        happened to work only because a core module exports `_start`. The fix
        resolves the `wasi:cli/run@*` interface-instance export down through its
        inner `run` canon-lift to the backing core export + core instance and
        drives THAT, reusing the #344 canon-lift resolution. FAIL LOUD (no
        `_start` fallback/guessing) when the run entry cannot be resolved.
      scope-note: >
        DIRECT hosting / reference scope (kilnd, SM-PERF-001). WASI imports of a
        run must be satisfied by the WasiDispatcher set (filesystem/cli/clocks/io/
        random); syscall-heavy fused cores needing interfaces outside that set are
        the #340-item-3 stub gap and fail loud at instantiate, not faked here.

