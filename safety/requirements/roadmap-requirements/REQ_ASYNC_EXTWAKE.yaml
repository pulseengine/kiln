artifacts:
- id: REQ_ASYNC_EXTWAKE
  type: requirement
  title: External wake-up path for parked tasks (event source → mark_ready)
  description: |
    kiln-async must let a task wait on a REAL external event and be resumed later. Today `Scheduler::mark_ready(TaskId)` exists and is public, and a task ends its slice with `TaskOutcome::Waited` to park (Blocked), but mark_ready is only ever driven by INTERNAL scheduler events — channel/ stream readiness resolved within `poll_round` (kiln-async/src/lib.rs mark_ready call sites are all intra-poll). There is no sanctioned path for an OUT-OF-LOOP event source (timer ISR, hardware IRQ, host callback, gale event-group signal) to wake a parked task, so "wait on a real event, be woken later" is not achievable today (benchmark Finding 8; the TaskOutcome::Waited doc). Deliver a sound external-wake API that preserves the crate invariants (no_std, NO alloc, #![forbid(unsafe_code)], fuel- bounded, O(1)): an out-of-loop producer records a pending wake for a TaskId that the next poll_round drains, with an explicitly documented concurrency model (single-threaded cooperative baseline; the ISR/multi-core story and any required synchronization stated, not assumed). This is the runtime-side counterpart the host Waker bridge (REQ_ASYNC_WAKERBRIDGE) calls into.
  status: proposed
  release: v0.5.0
  tags:
  - async
  - scheduler
  - no-std
  - no-alloc
  - embedded
  - wake
  - roadmap
  links:
  - type: derives-from
    target: REQ_ASYNC_SCHED
  fields:
    design-doc: docs/architecture/async-scheduler-plan.md
    note: |
      Gap surfaced by the kiln-async vs embassy benchmark (REQ_ASYNC_BENCH): the bench's futures only self-wake synchronously inline because no real external-wake path exists. mark_ready is already the safe primitive; this requirement is the plumbing + concurrency model that feeds it from outside poll_round.
