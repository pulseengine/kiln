      spec-reference: "WebAssembly Core Spec 3.0, Binary Format"
      verification-method: test
      verification-description: >
        WAST test suite: all assert_malformed tests pass with zero failures
      note: "~35 failures remain (Issue 148)"

  - id: SR-8
    type: requirement
    title: Resource limits enforced before allocation
    description: >
      Decoder shall check configured resource limits before allocating
      structures for types, functions, memories, tables, globals, and
      elements. The limit check shall occur before the allocation, not after.
    status: partial
    tags: [decoder, resource-containment, asil-d, stpa-derived]
    links:
      - type: derives-from
        target: CC-D-2
      - type: derives-from
        target: LS-D-2
    fields:
      previous-id: REQ_RESOURCE_002
      iso-26262: "ISO 26262-6:7.4.3"
      implementation: kiln-decoder/src/streaming_decoder.rs
      verification-method: test
      verification-description: >
        Module with count > limit for each section type is rejected
        without allocating the full count
      note: "Resource limits exist; pre-allocation check order not verified"

  # =========================================================================
  # STPA-derived: Canonical ABI correctness (from CC-CM-*, LS-CM-*)
  # =========================================================================
  - id: SR-9
    type: requirement
    title: String transcoding handles all encodings correctly
    description: >
      Canonical ABI string transcoding shall correctly handle UTF-8 (1-4 byte
      sequences), UTF-16 (including surrogate pairs), and Latin-1. Multi-byte
      characters shall not be split across buffer boundaries. Code unit counts
      shall match the encoding.
    status: draft
    tags: [component-model, canonical-abi, strings, stpa-derived]
    links:
      - type: derives-from
        target: CC-CM-1
      - type: derives-from
        target: LS-CM-1
    fields:
      implementation: kiln-component/src/canonical_abi/
      spec-reference: "Component Model Canonical ABI, String section"
      verification-method: test
      verification-description: >
        Shared wit-bindgen strings fixture with multi-byte characters;
        property-based roundtrip test

  - id: SR-10
    type: requirement
    title: Record field alignment matches canonical ABI spec
    description: >
      Record field offsets shall be computed using align_up(current_offset,
      field_alignment) as defined in the canonical ABI spec. The align_up
      function shall be: align_up(x, a) = (x + a - 1) & !(a - 1).
    status: draft
    tags: [component-model, canonical-abi, alignment, stpa-derived]
    links:
      - type: derives-from
        target: CC-CM-2
      - type: derives-from
        target: LS-CM-2
    fields:
      implementation: kiln-component/src/canonical_abi/
      spec-reference: "Component Model Canonical ABI, Record section"
      verification-method: test
      verification-description: >
        Shared wit-bindgen records fixture; unit tests for align_up

  - id: SR-11
    type: requirement
    title: List element size matches canonical ABI and Meld
    description: >
      List element size shall be computed as align_up(sum_of_field_sizes,
      max_alignment). This shall match Meld's canonical_abi_element_size()
      for all type families. Disagreement is a blocking defect.
    status: draft
    tags: [component-model, canonical-abi, cross-toolchain, stpa-derived]
    links:
      - type: derives-from
        target: CC-CM-3
      - type: derives-from
        target: LS-CM-3
      - type: derives-from
        target: LS-CM-6
    fields:
      implementation: kiln-component/src/canonical_abi/
      spec-reference: "Component Model Canonical ABI, List section; XH-1"
      verification-method: test
      verification-description: >
        Shared wit-bindgen fixtures run through Kiln; cross-validation of
        element sizes for 50+ type patterns vs Meld output

  - id: SR-12
    type: requirement
    title: Resource handle no-aliasing guarantee
    description: >
      Resource table shall guarantee that no two live handles share the same
      index. Generation counters or equivalent mechanism shall prevent aliasing
      even after rapid create/drop cycles.
    status: draft
    tags: [component-model, resources, stpa-derived]
    links:
      - type: derives-from
        target: CC-CM-4
      - type: derives-from
        target: LS-CM-4
    fields:
      previous-id: REQ_CMP_020
      implementation: kiln-component/src/components/resource_management.rs
      verification-method: test
      verification-description: >
        Create/drop/create cycle verifies no aliasing; 10000-cycle stress test

  - id: SR-13
    type: requirement
    title: Double-drop detection and trap
    description: >
      Dropping a resource handle that has already been dropped shall produce
      a trap, not corrupt the resource table.
    status: draft
    tags: [component-model, resources, stpa-derived]
    links:
      - type: derives-from
        target: CC-CM-5
    fields:
      implementation: kiln-component/src/components/resource_management.rs
      verification-method: test
      verification-description: >
        Create, drop, drop again: verify trap on second drop

