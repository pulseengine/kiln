    type: requirement
    title: Memory isolation between module instances
    description: >
      WebAssembly module instances shall be isolated from each other with
      no shared mutable state except through explicit, validated interfaces.
    status: implemented
    tags: [memory-safety, asil-d, migrated-from-sphinx]
