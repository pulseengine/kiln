# Safety Requirements — Consolidated
#
# System: Kiln — WebAssembly runtime for safety-critical systems
#
# This file merges:
#   1. STPA-derived requirements (SR-1 through SR-24) from hazard analysis
#   2. Sphinx-needs safety requirements (REQ_SAFETY_*, REQ_MEM_SAFETY_*, etc.)
#      migrated from docs/source/safety_manual/requirements.rst
#
# Merge strategy:
#   - Where sphinx-needs overlaps with STPA: keep SR-* ID, add previous-id
#   - Where sphinx-needs has no STPA equivalent: preserve original ID
#   - ISO 26262 traceability preserved from sphinx-needs
#
# Format: rivet generic-yaml

artifacts:
  # =========================================================================
  # STPA-derived: Execution correctness (from CC-E-*, LS-E-*)
  # =========================================================================
  - id: SR-1
    type: requirement
    title: Numeric instruction edge-case correctness
    description: >
      All numeric instructions shall produce results matching the WebAssembly
      reference interpreter for boundary inputs: NaN propagation, saturating
      conversions, signed division overflow (INT_MIN / -1), and division by
      zero. Rust's "as" cast shall not be used for float-to-int conversion
      without explicit boundary handling.
    status: draft
    tags: [execution, numeric, asil-d, stpa-derived]
    links:
      - type: derives-from
        target: CC-E-1
      - type: derives-from
        target: LS-E-1
    fields:
      implementation: kiln-runtime/src/stackless/engine.rs
      spec-reference: "WebAssembly Core Spec 3.0, Section 4.3.1-4.3.3"
      verification-method: test
      verification-description: >
        WAST test suite (i32.wast, i64.wast, f32.wast, f64.wast, conversions.wast)
        with zero assertion failures; property-based tests for all 12 conversion
        instructions with boundary values

  - id: SR-2
    type: requirement
    title: Fuel metering at all control flow points
    description: >
      Fuel shall be checked before every instruction dispatch when fuel
      metering is enabled. This includes loop back-edges, not just block
      and function entry. The fuel counter shall be atomic in multi-threaded
      configurations.
    status: partial
    tags: [execution, resource-containment, asil-c, stpa-derived]
    links:
      - type: derives-from
        target: CC-E-2
      - type: derives-from
        target: LS-E-2
    fields:
      previous-id: REQ_TEMPORAL_002, REQ_LFUNC_007
      iso-26262: "ISO 26262-6:7.4.5"
      implementation: kiln-runtime/src/stackless/engine.rs
      verification-method: test
      verification-description: >
        Infinite loop exhausts fuel within configured limit; code review that
        all branch targets include fuel check
      note: "Fuel mechanism exists (REQ_LFUNC_007 implemented); loop back-edge check not verified"

  - id: SR-3
    type: requirement
    title: Memory bounds check uses current size
    description: >
      Memory bounds checks shall read the memory's current size at each
      access, not a cached value. If caching is used for performance, the
      cache shall be invalidated on every memory.grow, memory.copy, and
      memory.fill that changes memory size.
    status: partial
    tags: [execution, memory-safety, asil-d, stpa-derived]
    links:
      - type: derives-from
        target: CC-E-3
      - type: derives-from
        target: LS-E-3
    fields:
      previous-id: REQ_MEM_SAFETY_001
      iso-26262: "ISO 26262-6:7.4.14"
      implementation: kiln-runtime/src/stackless/engine.rs
      spec-reference: "WebAssembly Core Spec 3.0, Section 4.4.7"
      verification-method: test
      verification-description: >
        WAST tests memory.wast, memory_grow.wast; regression test for access
        at old_size..new_size after grow
      note: "Bounds checking infrastructure exists; post-grow cache invalidation not verified"

  - id: SR-4
    type: requirement
    title: Unknown opcodes trap unconditionally
    description: >
      Any opcode or opcode prefix+suffix combination not defined in the
      WebAssembly spec shall cause an immediate trap. The default match arm
      in opcode dispatch shall return Err, not Ok.
    status: delegated
    delegation-note: "Canonical ABI delegated to Meld per BA RFC #46"
    tags: [execution, correctness, stpa-derived]
    links:
      - type: derives-from
        target: CC-E-4
      - type: derives-from
        target: LS-E-4
    fields:
      implementation: kiln-runtime/src/stackless/engine.rs
      verification-method: test
      verification-description: >
        All undefined opcodes (0x06-0x09 legacy, reserved ranges) produce
        a trap, not a silent no-op

  - id: SR-5
    type: requirement
    title: Call stack depth limit enforced for all call types
    description: >
      Maximum call depth shall be checked before call, call_indirect,
      call_ref, and return_call instructions. The check shall measure
      actual call depth (not frame count) to correctly handle tail calls.
    status: delegated
    delegation-note: "Canonical ABI delegated to Meld per BA RFC #46"
    tags: [execution, stack-safety, asil-d, stpa-derived]
    links:
      - type: derives-from
        target: CC-E-5
      - type: derives-from
        target: LS-E-5
    fields:
      previous-id: REQ_MEM_SAFETY_003
      iso-26262: "ISO 26262-6:7.4.14"
      implementation: kiln-runtime/src/stackless/engine.rs
      verification-method: test
      verification-description: >
        WAST tests call.wast; tail-call regression for deep return_call chain
      note: "Stack overflow protection exists; tail-call depth tracking not verified"

  - id: SR-6
    type: requirement
    title: Multi-memory index validation
    description: >
      In multi-memory modules, every memory instruction's memory index
      operand shall be validated against the module's declared memory count.
      Invalid indices shall trap. The engine shall not default to memory 0.
    status: delegated
    delegation-note: "Canonical ABI delegated to Meld per BA RFC #46"
    tags: [execution, memory-safety, stpa-derived]
    links:
      - type: derives-from
        target: CC-E-6
    fields:
      implementation: kiln-runtime/src/stackless/engine.rs
      spec-reference: "WebAssembly Multi-Memory Proposal"
      verification-method: test
      verification-description: >
        Instruction referencing non-existent memory index traps

