  - id: REQ_SAFETY_001
    type: requirement
    title: Safety-critical operation mode
    description: >
      The runtime shall provide a safety-critical operation mode with
      deterministic behavior, disabled dynamic features, and comprehensive
      error detection.
    status: implemented
    tags: [safety-policy, asil-d, migrated-from-sphinx]
    fields:
