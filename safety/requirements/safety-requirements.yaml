  - id: SR-7
    type: requirement
    title: Reject all malformed modules
    description: >
      The decoder shall reject modules with duplicate sections, out-of-order
      sections, invalid LEB128 encodings, and all other malformation checks
      defined in the WebAssembly spec.
    status: partial
    tags: [decoder, validation, asil-d, stpa-derived]
    links:
