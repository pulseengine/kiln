  - id: REQ_MEM_SAFETY_004
    type: requirement
    title: Memory initialization enforcement
    description: >
      All allocated memory shall be initialized to a known safe state
      before use. Uninitialized memory access shall be prevented.
    status: implemented
    tags: [memory-safety, asil-c, migrated-from-sphinx]
    fields:
