      verification-method: test, analysis

  - id: REQ_SAFETY_003
    type: requirement
    title: Fail-safe behavior
    description: >
      Upon detection of any safety-critical fault, the runtime shall
      transition to a fail-safe state and notify the system-level error
      handler.
    status: implemented
    tags: [safety-policy, asil-d, migrated-from-sphinx]
    fields:
      iso-26262: "ISO 26262-6:7.4.3"
      verification-method: test, analysis

  - id: REQ_SAFETY_004
    type: requirement
    title: Safety mechanism independence
    description: >
      Safety mechanisms shall be independent from the functionality they
      protect to avoid common cause failures.
    status: implemented
    tags: [safety-policy, asil-d, migrated-from-sphinx]
    fields:
      iso-26262: "ISO 26262-6:7.4.10"
      verification-method: analysis

