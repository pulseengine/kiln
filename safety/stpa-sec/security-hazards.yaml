# STPA-SEC: Security Hazards
#
# System: Kiln — WebAssembly runtime for safety-critical systems
#
# Security hazards are system states that, combined with adversarial action,
# can lead to security losses. Each hazard maps to one or more security losses
# (SL-*) and, where applicable, to safety hazards (H-*) from the STPA analysis.
#
# Unlike safety hazards (which concern unintentional failures), security hazards
# assume an intelligent adversary who crafts inputs specifically to trigger the
# hazardous state.

security-hazards:
  - id: SH-1
    title: Bounds check bypass via memory64 address truncation
    description: >
      The engine's bounds check path truncates a 64-bit effective address
      to 32 bits before comparison. An adversary crafts a memory64 module
      with addresses in the range [0x1_0000_0000, 0x1_FFFF_FFFF] that,
      after truncation, map to valid low addresses. This allows reading
      or writing arbitrary locations within the first 4 GiB of the
      linear memory, potentially including runtime metadata stored adjacent
      to linear memory (e.g., memory size fields, bounds check constants).
      If the linear memory buffer is allocated from a larger host buffer,
      the truncated address may reach host data.
    security-losses: [SL-1]
    safety-hazards: [H-2]
    attack-vector: >
      Attacker provides a memory64 module with i64.load instructions using
      addresses like 0x1_0000_0040 that truncate to 0x40, bypassing a
      bounds check against the full 64-bit address space.
    exploitability: high
    rationale: >
      Memory64 is a new feature; bounds check code paths may not have been
      updated from 32-bit to 64-bit arithmetic throughout the codebase.

  - id: SH-2
    title: Type confusion via incorrect GC casting
    description: >
      The engine's ref.cast or br_on_cast implementation has an incorrect
      subtype hierarchy check. An adversary constructs a module with a
      carefully chosen type hierarchy where type A and type B share a
      common ancestor but have different field layouts. By casting a
      reference from type A to type B, the adversary can read fields at
      offsets defined by type B but backed by type A's data, effectively
      performing a type-confused memory read. If struct fields contain
      indices into tables or memories, the confusion can escalate to
      out-of-bounds access.
    security-losses: [SL-1, SL-3]
    safety-hazards: [H-12]
    attack-vector: >
      Attacker defines: (type $a (sub (struct (field i32) (field i64))))
      and (type $b (sub (struct (field i64) (field i32)))). Both are subtypes
      of structref. A ref.cast from $a to $b reinterprets the i32 field as
      the low half of an i64, and the i64 field as an i32, producing
      attacker-controlled values at unexpected widths.
    exploitability: medium
    rationale: >
      GC type hierarchies are complex; subtype checking must be both
      sound and complete. Incomplete checks enable type confusion.

  - id: SH-3
    title: Resource exhaustion via unbounded GC allocation in kiln-builtins
    description: >
      In the kiln-builtins no_std runtime support library, GC heap objects
      are allocated from the bounded allocation pool but never reclaimed
      (no garbage collector). An adversary crafts a module that, after
      Synth compilation and execution on gale, allocates struct/array
      objects in a tight loop without ever dropping references. The bounded
      pool is exhausted, causing all subsequent allocation attempts
      (including those by kiln-builtins for host intrinsic state, tables,
      and other internal data) to fail. This is a denial-of-service attack
      that can prevent safety-critical code from executing on embedded
      targets.
    security-losses: [SL-2]
    safety-hazards: [H-12, H-3]
    attack-vector: >
      Module contains: (func (loop (struct.new $large_struct) (br 0)))
      where $large_struct has many fields. After Synth compilation, each
      iteration allocates from kiln-builtins pool without possibility of
      reclamation.
    exploitability: high
    rationale: >
      GC allocation in kiln-builtins shares the same pool as runtime
      intrinsic state. Pool exhaustion is trivially achievable by an
      adversary in the embedded execution path.

  - id: SH-4
    title: Timing side channels in atomic operations
    description: >
      Atomic memory operations (atomic.wait, atomic.notify, atomic RMW)
      have timing characteristics that depend on the state of shared
      memory. An adversary module can measure the time taken by atomic
      operations to infer the state of memory locations shared with
      another module (in a multi-module scenario), or to detect whether
      the host runtime is performing operations on adjacent memory. On
      platforms with hardware atomics, cache-line contention patterns
      reveal information about co-located data access.
    security-losses: [SL-3]
    safety-hazards: [H-11]
    attack-vector: >
      Adversary repeatedly executes atomic.wait with timeout=0 and measures
      the return time. Variations reveal whether another agent recently
      modified the target address.
    exploitability: low
    rationale: >
      Timing side channels are difficult to exploit but relevant for
      high-assurance systems where information flow must be controlled.

  - id: SH-5
    title: Stack overflow via deeply nested blocks or calls
    description: >
      An adversary crafts a module with deeply nested block structures
      (block within block within block, thousands deep) or deeply recursive
      function calls designed to overflow the host call stack or the
      runtime's internal value stack. If the stack overflow is not detected
      before it corrupts adjacent memory (e.g., the shadow stack, the
      linear memory bounds, or host stack frames), the adversary may
      achieve control flow hijacking or data corruption.
    security-losses: [SL-1, SL-4]
    safety-hazards: [H-2, H-3]
    attack-vector: >
      Module with 10,000 nested blocks: (block (block (block ... (br 9999)
      ...))). Each block pushes to the label stack. If the label stack is
      unbounded or shares memory with other structures, overflow corrupts
      adjacent data.
    exploitability: medium
    rationale: >
      Stack overflow is a classic attack vector. The runtime must enforce
      limits before corruption occurs, not after.

  - id: SH-6
    title: Integer overflow in wide arithmetic affecting control flow
    description: >
      An adversary exploits incorrect wide arithmetic (128-bit integer
      operations) to produce wrong comparison results that affect branch
      decisions. If the high 64 bits of a 128-bit multiplication are
      computed incorrectly, a subsequent branch-if-nonzero on the high
      word takes the wrong path. The adversary uses this to bypass
      validation logic implemented in WebAssembly (e.g., bounds checks,
      authentication checks, or capability validations within the wasm
      module itself).
    security-losses: [SL-1, SL-4]
    safety-hazards: [H-1]
    attack-vector: >
      Module implements a capability check using 128-bit arithmetic:
      if (i64.mul_wide_u(token, secret) == expected) { grant_access() }.
      Incorrect high-word computation causes the check to pass with a
      forged token.
    exploitability: medium
    rationale: >
      Wide arithmetic is new and complex. Implementation errors in
      carry propagation or sign extension are plausible.

  - id: SH-7
    title: ABI mismatch between Synth-compiled code and kiln-builtins
    description: >
      Synth compiles core WebAssembly modules to native ELF binaries that
      call into kiln-builtins via a C ABI interface. If Synth and
      kiln-builtins disagree on the calling convention (argument register
      assignment, stack layout, return value encoding, struct passing),
      an adversary can craft a module whose Synth-compiled output passes
      arguments that kiln-builtins misinterprets. This can cause
      kiln-builtins to perform memory operations at attacker-controlled
      offsets, bypass capability checks by reading wrong argument slots,
      or corrupt its internal state by writing return values to wrong
      locations.
    security-losses: [SL-1, SL-4]
    safety-hazards: [H-2, H-1]
    attack-vector: >
      Adversary provides a component that, after Meld lowering and Synth
      compilation, produces a native call sequence where the argument
      layout exploits a disagreement between Synth's ABI assumptions and
      kiln-builtins' ABI expectations. For example, Synth places a
      memory base pointer in register r2 while kiln-builtins reads it
      from r3, causing a bounds check to use an attacker-controlled value.
    exploitability: medium
    rationale: >
      The Synth-to-kiln-builtins ABI is defined by convention across two
      independent codebases. Version skew or platform-specific calling
      convention differences (ARM vs RISC-V) create opportunities for
      mismatch.

  - id: SH-8
    title: Capability escalation through Meld component fusion
    description: >
      Meld fuses multiple components into core modules at build time,
      resolving inter-component imports to direct calls. If Meld's fusion
      incorrectly wires an import from component A to an export from
      component B that has broader capabilities than A is authorized to
      use, the fused module grants A access to B's capabilities. An
      adversary who controls component A's source can exploit this to
      access filesystem, network, or other WASI capabilities that the
      original component graph did not authorize for A.
    security-losses: [SL-1, SL-3]
    safety-hazards: [H-8]
    attack-vector: >
      Adversary publishes a component that declares a narrow import
      (e.g., wasi:clocks/monotonic-clock). Meld's fusion, due to a name
      resolution bug or overly permissive matching, wires this import to
      a broader export (e.g., wasi:filesystem/types) from another
      component in the graph. The adversary's code now has filesystem
      access through the misrouted import.
    exploitability: medium
    rationale: >
      Component fusion is a complex graph transformation. Name resolution
      across WIT interfaces with versioning and aliasing creates
      opportunities for incorrect wiring that escalates capabilities.

  - id: SH-9
    title: Resource handle forgery via crafted handle values
    description: >
      The RFC #46 host intrinsics __wasm_import_<iface>_thing_new,
      thing_rep, and thing_drop operate on integer handle values that
      index into a per-component resource table. An adversary crafts a
      fused module that passes forged handle values to thing_rep or
      thing_drop, attempting to access resource slots belonging to other
      component instances or to the host runtime itself. If the resource
      table does not validate handle ownership (which component created
      the handle) and handle generation (to detect use-after-free), the
      adversary can read another component's resource representation via
      thing_rep, corrupt another component's resource via thing_drop, or
      cause a type confusion by using a handle created for resource type A
      with thing_rep for resource type B.
    security-losses: [SL-1, SL-3]
    safety-hazards: [H-6, H-13]
    attack-vector: >
      Adversary's component calls thing_rep(handle=42) where handle 42
      belongs to a co-resident component's file descriptor resource. The
      returned representation is the raw fd number, which the adversary
      uses to construct a WASI call targeting that fd. Alternatively, the
      adversary calls thing_drop(handle=42) to close the victim's fd,
      causing the victim to fail on subsequent I/O.
    exploitability: high
    rationale: >
      Handle values are plain integers with no cryptographic binding to
      the creating component. Without ownership and generation checks,
      handles are trivially forgeable by any code in the fused module.

  - id: SH-10
    title: Stream buffer overflow via attacker-controlled length
    description: >
      The RFC #46 stream_read(stream, memory, buffer, length) intrinsic
      writes up to `length` bytes into guest linear memory starting at
      `buffer`. An adversary crafts a fused module that passes a large
      `length` value or a `buffer` near the end of linear memory such
      that buffer + length overflows the linear memory bounds. If the
      host intrinsic does not validate buffer + length against the
      memory's current size before writing, the write overwrites memory
      beyond the guest's allocation. On embedded platforms without virtual
      memory (no_std), this can corrupt host runtime data structures,
      the capability-based memory budget tracker, or adjacent component
      memories. The same attack applies to stream_write reading from
      out-of-bounds guest memory, potentially leaking host data.
    security-losses: [SL-1, SL-4]
    safety-hazards: [H-2, H-13]
    attack-vector: >
      Module calls stream_read(stream_id, 0, buffer=0xFFFF_FF00, length=0x200).
      The effective range [0xFFFF_FF00, 0x1_0000_0100) extends 256 bytes past
      the end of a 4 GiB linear memory. On a no_std platform where linear
      memory is a contiguous allocation, the overflow writes into whatever
      follows: potentially the resource table, capability budget, or another
      component's memory.
    exploitability: high
    rationale: >
      Buffer overflow via unchecked length is a classic vulnerability.
      Stream intrinsics are new API surface from RFC #46 that may not
      yet have hardened bounds checking.

  - id: SH-11
    title: Thread sandbox escape via cross-component thread_switch_to
    description: >
      The RFC #46 thread_switch_to(thread_id) intrinsic directs the
      executor to suspend the current wasm logical thread and resume
      the target thread. An adversary crafts a fused module that calls
      thread_switch_to with a thread_id belonging to a different
      component instance. If the executor does not validate that the
      target thread belongs to the same component instance as the
      caller, the switch succeeds. The adversary's thread context is
      now executing within the target component's execution environment
      — with access to the target's linear memory, tables, globals, and
      resources. This is a full sandbox escape: the adversary can read
      and write the victim component's memory, call its internal
      functions via table references, and access its resources via
      thing_rep. On gale, where component instances may correspond to
      different RTOS task groups with different MPU configurations,
      the cross-component switch may also bypass hardware memory
      protection if the gale task inherits the target's MPU settings.
    security-losses: [SL-1, SL-3]
    safety-hazards: [H-14, H-17]
    attack-vector: >
      Adversary's component A observes (or guesses) that component B's
      thread_id is 3 (thread IDs may be sequential integers). Component
      A calls thread_switch_to(3). If the executor does not check
      ownership, the switch places A's execution in B's context. A
      then reads B's linear memory (containing secrets, keys, or
      application data) via ordinary load instructions.
    exploitability: high
    rationale: >
      Thread IDs are plain integers with no cryptographic binding to
      the creating component. Without ownership validation in the
      executor, cross-component switching is trivially achievable.
      This is analogous to SH-9 (resource handle forgery) but at the
      thread level, with more severe consequences because thread
      switching grants full memory access rather than just resource
      representation access.

  - id: SH-12
    title: Stream data exfiltration via cross-component handle confusion
    description: >
      An adversary crafts a fused module that uses a stream reader
      handle belonging to a different component instance. The stream
      was created by component B for inter-thread communication within
      B. Component A obtains (guesses or computes) the stream handle
      value and calls stream_read with it. If the stream infrastructure
      does not validate that the calling component owns the stream
      handle, A reads data that B intended to be private — potentially
      including cryptographic keys, authentication tokens, sensor data,
      or control commands. The same attack works in reverse: A writes
      into B's stream, injecting malicious data that B trusts because
      it came from "its own" stream. On gale, where streams are backed
      by shared memory ring buffers, the adversary may also be able to
      directly access the ring buffer memory if MPU regions are not
      configured per-stream.
    security-losses: [SL-1, SL-3]
    safety-hazards: [H-16, H-17]
    attack-vector: >
      Component A knows that component B created a stream with writer
      handle 5 and reader handle 6 (handles are sequential integers).
      A calls stream_read(6, 0, buffer=0x100, length=64) to read 64
      elements from B's stream into A's linear memory. If the stream
      read intrinsic does not check ownership, A receives B's data.
      Alternatively, A calls stream_write(5, 0, buffer=0x200, length=1)
      to inject a single crafted element into B's stream.
    exploitability: high
    rationale: >
      Stream handles are integers indexing into a shared stream table.
      Without per-component ownership checks, any component can read
      from or write to any stream in the system. This is the stream
      analog of SH-9 (resource handle forgery).
