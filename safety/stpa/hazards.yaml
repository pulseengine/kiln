# STPA Step 1b: System-Level Hazards
#
# System: Kiln — WebAssembly runtime for safety-critical systems
#
# Relation to BA RFC #46: Hazards H-4 through H-8 cover the runtime-side
#   concerns that the RFC's "Host C API" sections leave as TODOs. These
#   are the hazards that any runtime implementing the RFC must address.

hazards:
  - id: H-1
    title: Instruction execution produces wrong result
    description: >
      A core WebAssembly instruction (arithmetic, comparison, conversion,
      memory, table, control flow) produces a result that diverges from
      the WebAssembly Core Specification. This includes edge cases in
      float-to-int conversion, saturating arithmetic, SIMD lane operations,
      and atomic memory ordering. Relaxed SIMD instructions may produce
      non-deterministic results that violate safety requirements assuming
      deterministic execution (e.g., relaxed fma, relaxed swizzle, relaxed
      min/max returning different NaN bit patterns across runs). Wide
      arithmetic (128-bit integer) operations may overflow or truncate
      incorrectly, affecting control flow decisions.
    losses: [L-1, L-6]

  - id: H-2
    title: Memory access exceeds linear memory bounds
    description: >
      A load, store, memory.grow, memory.copy, or memory.fill operation
      accesses bytes outside the valid range of the target linear memory.
      In multi-memory mode, instructions reference the wrong memory index.
      The bounds check mechanism (software CMP, MPU, masking) has gaps.
      In memory64 mode, 64-bit addresses may be silently truncated to 32-bit
      during bounds checking, allowing access beyond the intended range.
      A u64 offset may overflow when added to the base address, wrapping
      around and bypassing bounds checks. A memory64 module may request
      allocation beyond the physical memory available on no_std platforms
      (where there is no virtual memory), causing OOM or corruption of
      adjacent physical memory regions. Custom page sizes may cause page
      size mismatch between host and guest, leading to incorrect bounds
      calculation when page_size * page_count overflows or uses the wrong
      page size constant.
    losses: [L-1, L-2, L-3]

  - id: H-3
    title: Resource budget exceeded without detection
    description: >
      Fuel, memory, table, or stack limits are exceeded but the runtime
      does not trap or report the violation. Execution continues in an
      unbounded state. The bounded allocation system is bypassed. In
      ASIL-D mode, the watchdog is not notified of budget exhaustion.
    losses: [L-3, L-7]

  - id: H-4
    title: Canonical ABI lifting/lowering produces wrong values
    description: >
      The Component Model canonical ABI implementation in kiln-component
      produces incorrect values during lift (core→component) or lower
      (component→core) operations. String encoding/decoding is wrong,
      list element sizing is incorrect, record field alignment is off,
      or variant discriminant handling is incorrect.
    losses: [L-4]

  - id: H-5
    title: Cross-component call misroutes or type-mismatches
    description: >
      A call from one component to another is dispatched to the wrong
      function, or the caller and callee disagree on the function signature.
      The linker resolves an import to the wrong export, or the
      cross_component_calls module uses incorrect instance indices.
    losses: [L-1, L-4]

  - id: H-6
    title: Resource handle lifecycle violation
    description: >
      A resource handle is used after being dropped, dropped twice, or
      leaked (never dropped). The resource table in kiln-component's
      resource_management module becomes inconsistent. Handle indices
      wrap around and alias previous handles.
    losses: [L-4, L-2]

  - id: H-7
    title: Async task scheduling violates ordering or fairness
    description: >
      The async executor in kiln-component starves a task, delivers
      stream/future values out of order, or resumes a cancelled task.
      The fuel-aware waker interferes with deterministic scheduling.
      Task cancellation leaves dangling references.
    losses: [L-4, L-6]
    scope: deferred
    note: "Async not in P2 scope"

  - id: H-8
    title: WASI host function violates capability boundary
    description: >
      A WASI filesystem, socket, or clock operation bypasses the
      WasiCapabilities security model. A component accesses a file path
      it was not granted access to, or the capability check uses the
      wrong component's capability set in a multi-component scenario.
    losses: [L-5, L-2]

  - id: H-9
    title: CFI shadow stack desynchronization
    description: >
      The shadow stack and the real execution stack diverge: a call pushes
      to one but not the other, or a return pops from one but not the other.
      After desync, all subsequent return address validations produce false
      positives or false negatives. The CFI violation policy (trap/log/
      continue) determines whether execution continues in a compromised state.
    losses: [L-8]

  - id: H-10
    title: Safety-level allocation violation
    description: >
      In ASIL-D/static-allocation mode, the runtime performs dynamic
      allocation. In bounded-allocation mode, a BoundedVec or BoundedMap
      exceeds its capacity without error. The safe_managed_alloc! macro
      fails to enforce per-crate budgets. An unsafe block in a
      #[forbid(unsafe_code)] crate is missed by the audit.
    losses: [L-3, L-7]

  - id: H-11
    title: Shared memory and atomic operation violation
    description: >
      A threads/atomics instruction violates memory ordering, data
      integrity, or liveness guarantees. Atomic load/store/RMW/cmpxchg
      operations on shared memory produce results inconsistent with the
      WebAssembly threads specification's sequentially-consistent ordering
      model. Even in single-threaded execution (Kiln's current mode),
      incorrect atomic semantics create latent bugs that manifest when
      multi-thread support is added. An atomic.wait instruction blocks
      the sole execution thread, causing a permanent deadlock (the spec
      requires trapping in single-threaded contexts). Atomic RMW operations
      (i32.atomic.rmw.add, etc.) apply the wrong operator or use incorrect
      byte widths (e.g., atomic.rmw8 operating on 16 bits). Shared memory
      alignment requirements for atomic operations are not enforced,
      causing torn reads/writes on platforms without hardware atomics.
    losses: [L-1, L-3, L-6]

  - id: H-12
    title: GC heap reference safety violation
    description: >
      A GC proposal instruction (struct.new, struct.get, array.new,
      array.get, ref.cast, br_on_cast) produces an incorrect result,
      accesses freed memory, or causes unbounded allocation. Struct and
      array heap objects are backed by Arc<Mutex<>> and may produce
      dangling references if the reference counting is incorrect or if
      the runtime drops a heap object while references remain. Type
      casting via ref.cast or br_on_cast uses incorrect subtype hierarchy
      traversal, allowing a reference to be interpreted as a wrong type
      (type confusion). In no_std environments without a garbage
      collector, struct/array references accumulate without reclamation,
      exhausting the bounded allocation pool. The GC type hierarchy
      (structref <: eqref <: anyref) is not correctly validated during
      cast operations, leading to unsound type coercions.
    losses: [L-1, L-2, L-3, L-7]

  - id: H-13
    title: Meld-fused module ABI mismatch
    description: >
      Meld produces a core module whose host intrinsic signatures don't
      match Kiln/kiln-builtins expectations. The fused module calls a
      host intrinsic with the wrong number of parameters, wrong types,
      or wrong calling convention, causing a trap, silent data corruption,
      or undefined behavior at the host boundary.
    losses: [L-1, L-2]

# Sub-hazards for complex areas
sub-hazards:
  # Refinements of H-4 (Canonical ABI)
  - id: H-4.1
    parent: H-4
    title: String transcoding produces invalid encoding
    description: >
      UTF-8 to UTF-16 or Latin-1 conversion produces invalid sequences,
      miscounts code units, or doesn't handle surrogate pairs. Matches
      Meld H-4.4 but at runtime rather than fusion time.
    scope: delegated-to-meld
    note: "Canonical ABI operations performed at build time by Meld per BA RFC #46"

  - id: H-4.2
    parent: H-4
    title: List element size computation disagrees with meld
    description: >
      Kiln's canonical_abi computes a different element size than Meld's
      parser.rs canonical_abi_element_size for the same type. When running
      meld-fused modules, the adapter allocates N bytes but kiln's lift
      reads M bytes (M ≠ N), causing data corruption.
    scope: delegated-to-meld
    note: "Canonical ABI operations performed at build time by Meld per BA RFC #46"

  - id: H-4.3
    parent: H-4
    title: Record field alignment padding differs from spec
    description: >
      Record fields are laid out with incorrect alignment, causing
      loads/stores to read from wrong offsets within the record's
      linear memory representation.
    scope: delegated-to-meld
    note: "Canonical ABI operations performed at build time by Meld per BA RFC #46"

  # Refinements of H-5 (cross-component)
  - id: H-5.1
    parent: H-5
    title: Blast zone containment fails to isolate fault
    description: >
      The blast_zone fault isolation mechanism fails to contain a trap
      in one component, allowing it to corrupt the state of another
      component or the runtime itself.

  # Refinements of H-2 (Memory access) — memory64 and custom page sizes
  - id: H-2.1
    parent: H-2
    title: 64-bit address truncated to 32-bit in bounds check
    description: >
      A memory64 load/store passes a 64-bit effective address to a bounds
      check that internally operates on 32-bit values (e.g., casting i64
      to u32). Addresses above 4 GiB wrap to low addresses, bypassing the
      bounds check and accessing arbitrary low memory.

  - id: H-2.2
    parent: H-2
    title: u64 offset addition overflows in memory64 mode
    description: >
      The effective address computation (base + offset) for memory64
      instructions uses u64 arithmetic. When base and offset are both
      large, the addition overflows (wraps to a small value), producing
      an effective address that appears within bounds but refers to the
      wrong memory location.

  - id: H-2.3
    parent: H-2
    title: Memory64 allocation exceeds physical memory on no_std platform
    description: >
      A memory64 module declares an initial or maximum memory size that
      exceeds the physical RAM available on an embedded platform. Without
      virtual memory, the allocation either succeeds (corrupting other
      memory regions) or causes an unrecoverable system fault.

  - id: H-2.4
    parent: H-2
    title: Custom page size mismatch causes incorrect bounds
    description: >
      A module declares a non-standard page size (e.g., 1 byte instead of
      65536). The bounds check uses the standard page size constant,
      computing memory.size * 65536 when the actual memory is
      memory.size * 1. Loads/stores near the true boundary either fail
      spuriously or succeed when they should trap.

  # Refinements of H-1 (Instruction execution) — relaxed SIMD and wide arithmetic
  - id: H-1.1
    parent: H-1
    title: Relaxed SIMD non-determinism violates safety invariants
    description: >
      Relaxed SIMD instructions (relaxed_fma, relaxed_min, relaxed_max,
      relaxed_swizzle, relaxed_dot) produce implementation-defined results
      that may vary between runs on the same platform. Safety-critical
      code that assumes deterministic execution produces different outputs,
      violating certification requirements for reproducible behavior.

  - id: H-1.2
    parent: H-1
    title: Wide arithmetic 128-bit overflow affects control flow
    description: >
      128-bit integer multiply or add (i64.mul_wide_s, i64.mul_wide_u,
      i64.add128, i64.sub128) produces incorrect high/low result pair.
      When the result is used in a subsequent branch condition, the
      wrong branch is taken, leading to incorrect program behavior.

  # Refinements of H-11 (Threads/Atomics)
  - id: H-11.1
    parent: H-11
    title: atomic.wait blocks single-threaded runtime permanently
    description: >
      memory.atomic.wait32 or memory.atomic.wait64 is executed in a
      single-threaded runtime without returning a "not-equal" or
      "timed-out" result. The sole thread blocks forever, causing
      the system to hang. The spec requires returning 1 (not-equal)
      immediately in contexts where no other thread can issue notify.

  - id: H-11.2
    parent: H-11
    title: Atomic RMW uses wrong byte width
    description: >
      An atomic.rmw8 or atomic.rmw16 instruction operates on more bytes
      than specified (e.g., a full 32-bit read-modify-write instead of 8-bit),
      corrupting adjacent bytes in shared memory.

  # Refinements of H-12 (GC)
  - id: H-12.1
    parent: H-12
    title: ref.cast type confusion via incorrect subtype check
    description: >
      ref.cast checks the runtime type of a reference against a target
      type but uses incorrect subtype hierarchy traversal. A reference
      to struct type A is successfully cast to unrelated struct type B,
      and subsequent struct.get reads fields at wrong offsets, producing
      garbage data or accessing out-of-bounds memory.

  - id: H-12.2
    parent: H-12
    title: GC heap objects accumulate without bound in no_std
    description: >
      In no_std mode, there is no garbage collector. Struct and array
      heap objects are allocated from the bounded allocation pool but
      never reclaimed (Arc reference counts never reach zero due to
      cycles or long-lived references). The pool is exhausted, causing
      subsequent allocations to fail and trapping the module.

  # Refinements of H-13 (Meld-fused ABI mismatch) — RFC #46 host intrinsics
  - id: H-13.1
    parent: H-13
    title: Thread intrinsic ABI mismatch
    description: >
      thread_new returns a handle value whose format (size, encoding,
      or sentinel values) does not match what the fused module expects.
      The caller misinterprets the thread_id, leading to thread_switch_to
      targeting the wrong thread or a non-existent thread. In single-
      threaded mode, thread_new must always return 0 and thread_switch_to
      must be a no-op; any deviation causes the fused module to enter
      an impossible scheduling state.

  - id: H-13.2
    parent: H-13
    title: Stream/future buffer overrun
    description: >
      stream_read or stream_write receives a (memory, buffer, length)
      triple where buffer + length exceeds the linear memory bounds.
      The host intrinsic writes beyond the guest's allocated memory,
      corrupting adjacent data or host runtime state. This also applies
      to future_read/future_write with the same buffer parameter pattern.

  - id: H-13.3
    parent: H-13
    title: Resource handle confusion
    description: >
      __wasm_import_<iface>_thing_rep returns a representation value
      that does not correspond to the handle passed in. The fused module
      uses the wrong representation to access the underlying resource,
      causing data corruption or cross-component information leakage.
      Alternatively, thing_new returns a handle that aliases a live
      handle from a different resource type.

  - id: H-13.4
    parent: H-13
    title: Waitable set deadlock
    description: >
      waitable_set_wait is called in a single-threaded runtime where no
      other execution context can produce events. The sole thread blocks
      permanently, causing the system to hang. This is especially dangerous
      when the waitable set is empty (no waitables joined) or when all
      joined waitables are in a terminal state. The single-threaded runtime
      must use waitable_set_poll (non-blocking) instead, or return an error
      from waitable_set_wait.

  - id: H-13.5
    parent: H-13
    title: Task status misinterpretation
    description: >
      A __wasm_export_<iface>_<func>__task_return or task_cancel callback
      receives or produces an event code or task status constant that does
      not match the defined constants (EVENT_NONE=0, EVENT_SUBTASK=1,
      EVENT_STREAM_READ=2, EVENT_STREAM_WRITE=3, EVENT_FUTURE_READ=4,
      EVENT_FUTURE_WRITE=5, EVENT_CANCELLED=6; TASK_STATUS_STARTING=0,
      STARTED=1, RETURNED=2, START_CANCELLED=3, RETURN_CANCELLED=4).
      Misinterpretation causes the caller to take the wrong action: e.g.,
      treating RETURNED(2) as EVENT_STREAM_READ(2) because both use the
      value 2 in different enum spaces.

  # Refinements of H-9 (CFI)
  - id: H-9.1
    parent: H-9
    title: Indirect call target validation uses wrong type index
    description: >
      call_indirect checks the function signature against the wrong
      type index, either allowing a type-mismatched call or rejecting
      a valid one.
