# STPA Step 3: Unsafe Control Actions
#
# System: Kiln — WebAssembly runtime for safety-critical systems
#
# Format: UCAs grouped by controller, categorized by type:
#   not-providing: Action needed but not taken
#   providing: Action taken when it shouldn't be
#   too-early-too-late: Action timing incorrect
#   stopped-too-soon: Action duration too short
#
# Relation to BA RFC #46: Kiln implements the runtime-side functionality
#   that the RFC splits across "Host C API for Lowered Components" and
#   "Host C API for Embedder Bindings". These UCAs cover the hazards
#   that any runtime implementing the RFC must address.

engine-ucas:
  control-action: "Execute WebAssembly instructions"
  controller: CTRL-ENGINE

  providing:
    - id: UCA-E-1
      description: >
        Engine executes arithmetic instruction with incorrect semantics for
        edge cases (NaN propagation, saturating conversion, division by zero
        rounding).
      context: "Numeric instruction with boundary input values"
      hazards: [H-1]

    - id: UCA-E-4
      description: >
        Engine dispatches to wrong instruction handler due to opcode decoding
        error, executing a different instruction than what is encoded.
      context: "Multi-byte opcode (SIMD, atomics) decoding"
      hazards: [H-1]

    - id: UCA-E-6
      description: >
        Engine uses wrong memory index in multi-memory mode, reading from or
        writing to the wrong component's linear memory.
      context: "Multi-memory module with memory.copy between memories"
      hazards: [H-2]

  not-providing:
    - id: UCA-E-2
      description: >
        Engine does not check fuel budget before executing instruction,
        allowing unbounded execution past the configured fuel limit.
      context: "Fuel metering enabled, long-running loop"
      hazards: [H-3]

    - id: UCA-E-3
      description: >
        Engine performs memory access with incorrect bounds check: off-by-one
        in the comparison, or check uses wrong memory size after memory.grow.
      context: "Memory load/store near page boundary after grow"
      hazards: [H-2]

    - id: UCA-E-5
      description: >
        Engine does not trap on stack overflow, allowing call stack to exceed
        maximum depth and corrupt adjacent memory.
      context: "Deeply recursive function call chain"
      hazards: [H-2, H-3]

  # --- Memory64 address calculation ---
    - id: UCA-E-7
      description: >
        Engine computes memory64 effective address by truncating the i64
        address or u64 offset to 32 bits before performing the bounds check,
        allowing access to memory locations that should be out of bounds.
      context: "Memory64 module with addresses above 4 GiB"
      hazards: [H-2]

    - id: UCA-E-8
      description: >
        Engine does not detect u64 overflow in memory64 effective address
        computation (base + offset wraps around), producing a small effective
        address that passes the bounds check but refers to the wrong location.
      context: "Memory64 load with large base and large offset"
      hazards: [H-2]

  # --- Atomic RMW ---
    - id: UCA-E-9
      description: >
        Engine executes atomic RMW instruction (i32.atomic.rmw.add,
        i64.atomic.rmw.xor, etc.) with incorrect byte width, reading or
        writing more bytes than specified by the instruction suffix (rmw8,
        rmw16), corrupting adjacent bytes in shared memory.
      context: "Atomic rmw8 on shared memory near a field boundary"
      hazards: [H-11]

    - id: UCA-E-10
      description: >
        Engine executes memory.atomic.wait32/wait64 without checking whether
        the runtime is single-threaded, causing the sole execution thread to
        block permanently instead of returning 1 (not-equal) immediately.
      context: "Single-threaded no_std runtime executing atomic.wait"
      hazards: [H-11]

  # --- Relaxed SIMD non-determinism ---
    - id: UCA-E-11
      description: >
        Engine executes relaxed SIMD instruction (relaxed_fma, relaxed_min,
        relaxed_max, relaxed_swizzle) and produces non-deterministic results
        without any mechanism to detect or constrain the non-determinism, in
        a safety-critical context that requires deterministic execution.
      context: "ASIL-rated module using relaxed SIMD for numeric computation"
      hazards: [H-1]

  # --- Wide arithmetic ---
    - id: UCA-E-12
      description: >
        Engine executes wide arithmetic instruction (i64.mul_wide_s,
        i64.mul_wide_u, i64.add128, i64.sub128) and produces incorrect
        high or low 64-bit result, leading to wrong branch decisions
        or arithmetic results downstream.
      context: "128-bit multiplication used in cryptographic or financial computation"
      hazards: [H-1]

decoder-ucas:
  control-action: "Parse and validate WebAssembly binary"
  controller: CTRL-DECODER

  not-providing:
    - id: UCA-D-1
      description: >
        Decoder accepts a malformed module that should be rejected, allowing
        execution of invalid bytecode that causes undefined behavior in the
        engine.
      context: "Fuzzer-generated or adversarial module input"
      hazards: [H-1, H-2]

    - id: UCA-D-2
      description: >
        Decoder does not enforce resource limits (max functions, max memories,
        max types), allowing a module to exhaust the runtime's allocation budget
        during parsing.
      context: "Module with millions of type definitions"
      hazards: [H-3]

  providing:
    - id: UCA-D-3
      description: >
        Decoder misidentifies a component as a core module (or vice versa),
        causing the wrong instantiation path to be taken.
      context: "Component binary with version byte differences"
      hazards: [H-4, H-5]

component-model-ucas:
  control-action: "Lift, lower, and dispatch Component Model operations"
  controller: CTRL-CM

  providing:
    - id: UCA-CM-1
      description: >
        Canonical lift produces wrong string value: UTF-8 to UTF-16 conversion
        miscounts code units or produces invalid sequences.
      context: "String containing multi-byte UTF-8 characters"
      hazards: [H-4]
      scope: delegated-to-meld

    - id: UCA-CM-2
      description: >
        Canonical lower computes wrong byte offset for record field due to
        incorrect alignment calculation.
      context: "Record with mixed-size fields (u8, u32, u64)"
      hazards: [H-4]
      scope: delegated-to-meld

    - id: UCA-CM-3
      description: >
        Canonical lift/lower for list type uses wrong element size, reading
        past the end of the list buffer or leaving uninitialized gaps.
      context: "list<tuple<u8, u32, u8>> where element_size != sum of field sizes"
      hazards: [H-4]
      scope: delegated-to-meld

    - id: UCA-CM-4
      description: >
        Resource handle creation returns a handle index that aliases a
        previously-dropped but not-yet-reclaimed handle.
      context: "Rapid create/drop cycle filling resource table"
      hazards: [H-6]
      scope: reduced

    - id: UCA-CM-5
      description: >
        Resource drop is called twice for the same handle, corrupting the
        resource table's free list or dropping the wrong resource.
      context: "Component error path that drops handle in both normal and cleanup code"
      hazards: [H-6]
      scope: reduced

    - id: UCA-CM-7
      description: >
        Cross-component call dispatches to wrong function due to incorrect
        instance index lookup in the linker's resolution table.
      context: "Multiple component instances with same export name"
      hazards: [H-5]
      scope: delegated-to-meld

    - id: UCA-CM-8
      description: >
        Canonical ABI element size computation disagrees with Meld's
        fusion-time computation for the same type, causing meld-fused
        modules to corrupt data at the kiln lift/lower boundary.
      context: "Running a meld-fused component through kiln with P2 wrapper"
      hazards: [H-4]
      scope: reduced
      rationale: >
        This is a cross-tool consistency hazard. Meld computes CopyLayout
        at fusion time; Kiln computes canonical ABI layout at runtime. If
        they disagree, the data is silently corrupted. This must be tested
        with shared test fixtures (wit-bindgen composed-runner components).

  too-early-too-late:
    - id: UCA-CM-6
      description: >
        Async task is resumed after cancellation, executing with stale or
        freed state.
      context: "Task cancellation racing with stream data arrival"
      hazards: [H-7]
      scope: deferred

linker-ucas:
  control-action: "Resolve imports to exports across component instances"
  controller: CTRL-LINKER

  providing:
    - id: UCA-L-1
      description: >
        Linker resolves import to wrong export due to name collision between
        component instances.
      context: "Two components exporting same interface name"
      hazards: [H-5]

  not-providing:
    - id: UCA-L-2
      description: >
        Linker does not verify type compatibility between import and export,
        allowing a function with signature (i32)->i32 to be linked to a
        function with signature (i32,i32)->i32.
      context: "Component upgrade changes function signature"
      hazards: [H-5]

  too-early-too-late:
    - id: UCA-L-3
      description: >
        Linker instantiates module before its dependencies are ready,
        causing the start function to observe uninitialized state.
      context: "Circular dependency between component instances"
      hazards: [H-5]

cfi-ucas:
  control-action: "Validate control flow integrity"
  controller: CTRL-CFI

  not-providing:
    - id: UCA-CFI-1
      description: >
        Shadow stack push is skipped for a call instruction, causing all
        subsequent return validations to be off-by-one.
      context: "Host-to-guest call that bypasses CFI instrumentation"
      hazards: [H-9]

  providing:
    - id: UCA-CFI-2
      description: >
        Indirect call target validation uses wrong type index (e.g., the
        table element's type vs the call_indirect's type annotation), allowing
        a type-mismatched indirect call.
      context: "call_indirect with subtyping"
      hazards: [H-9]

    - id: UCA-CFI-3
      description: >
        CFI violation policy is set to "continue" in production, allowing
        execution to proceed after a detected control flow violation.
      context: "Deployment misconfiguration"
      hazards: [H-8, H-9]

wasi-ucas:
  control-action: "Execute WASI host function with capability check"
  controller: CTRL-WASI

  providing:
    - id: UCA-W-1
      description: >
        WASI filesystem operation uses wrong component's capability set,
        granting one component access to another component's allowed paths.
      context: "Multi-component instance with different filesystem grants"
      hazards: [H-8]

    - id: UCA-W-2
      description: >
        WASI clock read returns non-monotonic value, causing application
        logic that depends on monotonic time to compute negative durations
        or infinite loops.
      context: "Platform clock with NTP adjustment"
      hazards: [H-5]

    - id: UCA-W-3
      description: >
        WASI random returns predictable sequence (e.g., seeded PRNG in
        no_std mode without hardware RNG), compromising application
        cryptographic operations.
      context: "Embedded platform without hardware entropy source"
      hazards: [H-5]

blast-zone-ucas:
  control-action: "Isolate component fault within containment zone"
  controller: CTRL-BLAST

  not-providing:
    - id: UCA-BZ-1
      description: >
        Blast zone does not contain fault: a trap in one component corrupts
        shared runtime state (e.g., the linker's instance table) before the
        blast zone handler activates.
      context: "Trap during cross-component call with partially-written state"
      hazards: [H-2, H-5]

allocation-ucas:
  control-action: "Manage memory allocation within safety-level budgets"
  controller: CTRL-ALLOC

  not-providing:
    - id: UCA-A-1
      description: >
        Allocation succeeds in ASIL-D/static-allocation mode when it should
        be rejected, violating the no-dynamic-allocation guarantee.
      context: "Runtime code path that bypasses safe_managed_alloc! macro"
      hazards: [H-10]

    - id: UCA-A-2
      description: >
        BoundedVec exceeds capacity without returning error, silently
        dropping the inserted element or corrupting adjacent memory.
      context: "BoundedVec at capacity with push operation"
      hazards: [H-3, H-10]

gc-ucas:
  control-action: "Manage GC heap allocation, deallocation, and type casting"
  controller: CTRL-ENGINE

  providing:
    - id: UCA-GC-1
      description: >
        Engine allocates a new GC heap object (struct.new, array.new) without
        checking the bounded allocation pool capacity, causing pool exhaustion
        in no_std mode where no garbage collector reclaims unreachable objects.
      context: "Long-running no_std module creating many short-lived structs"
      hazards: [H-12, H-3]

    - id: UCA-GC-2
      description: >
        Engine executes ref.cast with incorrect subtype hierarchy traversal,
        allowing a reference of type A to be successfully cast to unrelated
        type B. Subsequent field access (struct.get, array.get) reads data
        at wrong offsets, producing garbage values or accessing out-of-bounds
        memory within the heap object.
      context: "Module using ref.cast between struct types with different field layouts"
      hazards: [H-12, H-1]

    - id: UCA-GC-3
      description: >
        Engine executes br_on_cast with inverted cast result, branching to the
        target when the cast should fail (or falling through when it should
        succeed), causing the module to operate on a reference of the wrong type.
      context: "Pattern-matching code using br_on_cast for type dispatch"
      hazards: [H-12, H-1]

  not-providing:
    - id: UCA-GC-4
      description: >
        Engine does not validate that a GC heap reference is still live before
        executing struct.get or array.get. If the backing Arc<Mutex<>> has been
        dropped (reference count reached zero), the access reads freed memory
        or panics on a poisoned mutex.
      context: "Reference held across a function boundary after the allocating scope returns"
      hazards: [H-12, H-2]

    - id: UCA-GC-5
      description: >
        Engine does not enforce allocation limits for GC heap objects
        separately from linear memory limits, allowing a module to exhaust
        host memory via struct/array allocations while linear memory remains
        within its configured budget.
      context: "Module that allocates millions of small structs without growing linear memory"
      hazards: [H-12, H-3, H-10]

builtins-ucas:
  control-action: "Provide host intrinsic implementations for synth-compiled code"
  controller: CTRL-BUILTINS

  providing:
    - id: UCA-BI-1
      description: >
        Builtin provides wrong return type to synth-compiled code. A
        kiln-builtin host intrinsic returns a value whose type (e.g., i64
        instead of i32, or wrong struct layout) does not match what the
        synth-compiled caller expects, causing the caller to misinterpret
        the return value and produce incorrect results or memory corruption.
      context: "Synth-compiled module calling kiln-builtin after Meld fusion"
      hazards: [H-13]

    - id: UCA-BI-2
      description: >
        thread_new is called with an invalid table index or func index.
        The host intrinsic dereferences the table at an out-of-bounds index
        or resolves a function reference that does not exist, causing a trap,
        memory corruption, or dispatch to the wrong function. In single-
        threaded mode, thread_new should ignore table/func and return 0, but
        an implementation that validates eagerly may trap unnecessarily.
      context: "Fused module calls thread_new(ctx, table=999, func=0) with invalid table index"
      hazards: [H-13]

    - id: UCA-BI-3
      description: >
        stream_read is provided with a buffer pointer and length that
        together reference memory outside the guest's linear memory bounds.
        The host intrinsic writes read data to addresses beyond the linear
        memory allocation, corrupting host runtime state or adjacent
        component memory. The same applies to stream_write reading from
        out-of-bounds guest memory.
      context: "stream_read(stream, memory, buffer=0xFFFFFFF0, length=256) overflows 32-bit address space"
      hazards: [H-13]

    - id: UCA-BI-4
      description: >
        __wasm_import_<iface>_thing_drop is called on a handle that has
        already been dropped. The host intrinsic double-frees the resource,
        corrupting the resource table's free list. A subsequent thing_new
        may return a handle that aliases a live resource belonging to
        another component, enabling cross-component data access.
      context: "Error path in fused module drops resource handle in both normal and cleanup code"
      hazards: [H-13]

    - id: UCA-BI-5
      description: >
        waitable_set_wait is called on a waitable set that has no joined
        waitables (empty set). In a single-threaded runtime, no event can
        ever be produced, so the call blocks the sole execution thread
        permanently. Even in a multi-threaded runtime, waiting on an empty
        set is a logic error that should return an error or trap immediately.
      context: "Fused module calls waitable_set_wait immediately after waitable_set_new without joining any waitables"
      hazards: [H-13]

    - id: UCA-BI-6
      description: >
        __wasm_export_<iface>_<func>__task_return is called after the
        corresponding task has already been cancelled (task status is
        START_CANCELLED=3 or RETURN_CANCELLED=4). The host intrinsic
        attempts to deliver a return value to a task whose caller has
        already been notified of cancellation, causing a double-completion
        that corrupts the async task scheduler state or delivers stale
        data to a recycled task slot.
      context: "Race between task cancellation and task completion in async component execution"
      hazards: [H-13]
